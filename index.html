S.t1=`<div class="card">
<h2 style="color:#818cf8">🏠 ما هو نظام التشغيل؟</h2>
<div class="cb"><div class="lb pu">التعريف الرسمي</div>
نظام التشغيل هو <span class="hl">برنامج وسيط</span> يجلس بين المستخدم وأجهزة الحاسب، يُتيح تشغيل التطبيقات وإدارة الموارد بكفاءة.<br>
<b>أمثلة:</b> Windows · Linux · macOS · Android · iOS
</div>
<div class="ez">لما تضغط على لعبة في جوالك — الجوال لا يفهم "لعبة"، يفهم فقط أرقاماً (0 و1). نظام التشغيل هو الذي يترجم ضغطتك إلى لغة الجهاز. بدونه = الجهاز بلا فائدة مثل سيارة بدون محرك!</div>


<h3>📱 الأنظمة المحمولة (Mobile Systems) ⭐</h3>
<div class="cb g"><div class="lb gr">Mobile Systems — الهاتف الذكي وأجهزة الساعة</div>
أنظمة التشغيل المصممة للهواتف الذكية والأجهزة اللوحية والساعات الذكية.<br><br>
<b>الخصائص الأساسية:</b><br>
• تعمل على معالجات منخفضة استهلاك الطاقة<br>
• تتميز بواجهات سهلة الاستخدام (اللمس والصوت)<br>
• تدعم تطبيقات متنوعة: ألعاب، شبكات اجتماعية، خدمات<br>
• تتصل بالشبكات السحابية وتتبادل البيانات أثناء التنقل<br>
• أمثلة: <b>Android</b> (مبني على Linux Kernel) و <b>iOS</b> (مبني على XNU/Darwin)
</div>

<div class="cb y"><div class="lb yl">⭐ للاختبار — نقاط المقاطعة</div>
• <b>Interrupt Vector</b> = جدول يحتوي عناوين جميع ISRs — CPU يبحث فيه عند كل مقاطعة<br>
• <b>ISR (Interrupt Service Routine)</b> = الكود الذي يُنفَّذ عند كل نوع مقاطعة<br>
• <b>Trap / Exception</b> = مقاطعة برمجية داخلية — System Call هي Trap مقصود<br>
• عند المقاطعة: CPU ① يُنهي التعليمة الحالية ② يحفظ PC في Stack ③ ينتقل للـ ISR ④ يعود
</div>

<h3>🌐 أنظمة العميل-الخادم (Client-Server Systems)</h3>
<div class="cb"><div class="lb pu">1. المقابس (Sockets) ⭐</div>
نقطة نهاية للتواصل بين عمليتين عبر الشبكة. تتكون من: <b>عنوان IP</b> + <b>رقم منفذ (Port)</b>.<br>
مثال: <code>161.25.19.8:1625</code> = جهاز 161.25.19.8 على المنفذ 1625<br>
المنافذ تحت 1024 = Well-Known Ports (محجوزة للخدمات القياسية مثل HTTP:80)<br>
127.0.0.1 = Loopback (يُشير لنفس الجهاز)
</div>
<div class="cb g"><div class="lb gr">2. استدعاء الإجراء عن بُعد (RPC)</div>
Remote Procedure Call = يتيح لبرنامج استدعاء دالة موجودة على جهاز آخر عبر الشبكة كأنها محلية.<br>
يستخدم Stubs (وكلاء) لتجميد المعاملات (Marshaling) وإرسالها عبر الشبكة.
</div>
<div class="cb o"><div class="lb or">3. استدعاء الأسلوب عن بُعد (RMI)</div>
Remote Method Invocation = نسخة Java من RPC. يتيح لكائن Java استدعاء أساليب كائن Java آخر على جهاز مختلف.
</div>

<h3>⚡ Context Switching — التبديل السياقي وتأثيره على الأداء</h3>
<div class="cb o"><div class="lb or">مفهوم Context Switching في إدارة الذاكرة</div>
عندما يكون هناك عمليات متعددة تحتاج CPU والذاكرة في نفس الوقت:<br>
① يقوم OS بحفظ حالة العملية الحالية (السجلات، عدادات، مواقع البيانات)<br>

<b>التأثير على الأداء:</b><br>
• زمن التبديل = <b>Overhead</b> — لا يقوم النظام بأي عمل مفيد خلاله<br>
• كلما زاد عدد التبديلات، قل الأداء الفعلي للنظام<br>

<h3>💾 التخزين المؤقت (Caching) ⭐</h3>
<div class="cb"><div class="lb gr">كيف يعمل Cache؟</div>
عند الحاجة لبيانات، يبحث النظام أولاً في Cache:<br>
<b>① Cache Hit:</b> البيانات موجودة في Cache ← يستخدمها مباشرة (سريع جداً!)<br>
<b>② Cache Miss:</b> البيانات غير موجودة ← يجلبها من المصدر الأبطأ ويُخزّنها في Cache للمرة القادمة
</div>

<h3>📄 التصفيح (Paging) ⭐⭐ الأهم!</h3>
<div class="cb y"><div class="lb yl">ما هو Paging؟</div>
تقسيم الذاكرة الفعلية لأجزاء متساوية الحجم تسمى <b>Frames</b>، وتقسيم المنطقي للعملية لأجزاء متساوية تسمى <b>Pages</b>.<br>
الحجم عادةً = 4 KB. <b>Page Table</b> يربط كل Page بـ Frame في RAM.

<b>أنواع الذاكرة:</b> RAM (متطايرة، قراءة/كتابة) vs ROM (غير متطايرة، للـ Firmware)<br>
<b>هرمية التخزين:</b> Cache (ns) ← RAM (ms) ← SSD (ms) ← HDD (s)<br>
<b>Caching:</b> Cache Hit = استخدام فوري | Cache Miss = جلب من مصدر أبطأ<br>
<b>DMA:</b> نقل البيانات مباشرة بين الجهاز والذاكرة دون CPU في كل خطوة<br>
<b>Fragmentation:</b> داخلية (داخل القسم) + خارجية (بين الأقسام) = يبطئ النظام<br>
<b>Segmentation:</b> تقسيم منطقي متغير الحجم | Code, Stack, Data, Heap<br>
<b>Paging:</b> تقسيم متساوي (4KB) | Pages ← Page Table → Frames | لا تجزئة خارجية<br>
<b>Context Switch Overhead:</b> كلما زاد عدد العمليات/التبديلات = قل الأداء الفعلي
</div>

S.t8=`<div class="card">
<h2 style="color:#f87171">🔐 الموضوع الثامن: مزامنة العمليات</h2>

<div class="cb r"><div class="lb" style="color:#f87171">لماذا نحتاج المزامنة؟</div>
عندما تصل عدة عمليات أو خيوط لنفس البيانات في آنٍ واحد — قد تُفسَد البيانات! هذا يُسمى <b>Race Condition</b>.
</div>
<div class="ez">مثال: عمليتان A و B تقرآن Счётчик=5 معاً وتزيدانه بـ1. A تكتب 6، ثم B تكتب 6 — النتيجة الصحيحة كانت 7! هذا هو Race Condition.</div>

<h3>🚦 مشكلة القسم الحرج (Critical Section Problem)</h3>
<div class="diagram">
<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,Arial">
  <text x="350" y="20" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">هيكل القسم الحرج</text>
  <defs><marker id="ca" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0.5 L0,6.5 L6,3.5 z" fill="#f87171"/></marker></defs>
  <!-- Process code block -->
  <rect x="180" y="32" width="340" height="178" rx="8" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <rect x="188" y="40" width="324" height="30" rx="4" fill="rgba(52,211,153,.15)" stroke="#34d399"/>
  <text x="350" y="59" text-anchor="middle" fill="#34d399" font-size="9">Entry Section — طلب الدخول (يحصل على القفل)</text>
  <rect x="188" y="76" width="324" height="50" rx="4" fill="rgba(248,113,113,.2)" stroke="#f87171" stroke-width="2"/>
  <text x="350" y="97" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">🔒 CRITICAL SECTION</text>
  <text x="350" y="115" text-anchor="middle" fill="#94a3b8" font-size="9">الكود الذي يصل للموارد المشتركة — خيط واحد فقط!</text>
  <rect x="188" y="132" width="324" height="30" rx="4" fill="rgba(251,191,36,.15)" stroke="#fbbf24"/>
  <text x="350" y="151" text-anchor="middle" fill="#fbbf24" font-size="9">Exit Section — الإفراج عن القفل</text>
  <rect x="188" y="168" width="324" height="34" rx="4" fill="rgba(30,40,60,.5)" stroke="#334155"/>
  <text x="350" y="188" text-anchor="middle" fill="#64748b" font-size="9">Remainder Section — باقي الكود العادي</text>
  <!-- Labels -->
  <text x="50" y="78" fill="#34d399" font-size="8.5" text-anchor="middle">يطلب</text>
  <text x="50" y="92" fill="#34d399" font-size="8.5" text-anchor="middle">الدخول</text>
  <path d="M75 75 L188 90" stroke="#34d399" stroke-width="1.5" marker-end="url(#ca)"/>
  <text x="620" y="112" fill="#f87171" font-size="8.5" text-anchor="middle">منطقة</text>
  <text x="620" y="126" fill="#f87171" font-size="8.5" text-anchor="middle">حرجة!</text>
  <path d="M600 115 L512 105" stroke="#f87171" stroke-width="1.5" marker-end="url(#ca)"/>
</svg>
</div>

<div class="cb"><div class="lb pu">شروط الحل الصحيح (3 شروط أساسية) ⭐</div>
① <b>Mutual Exclusion (الإقصاء المتبادل):</b> عملية واحدة فقط داخل القسم الحرج في أي وقت<br>
② <b>Progress (التقدم):</b> إذا كان القسم الحرج فارغاً، يجب السماح لعملية بالدخول فوراً<br>
③ <b>Bounded Waiting (الانتظار المحدود):</b> لا عملية تنتظر للأبد — لا يوجد Starvation
</div>

<h3>🔒 أدوات المزامنة</h3>
<div class="tw"><table>
<tr><th>الأداة</th><th>كيف تعمل</th><th>الاستخدام</th></tr>
<tr><td><b style="color:#f87171">Mutex</b></td><td>قفل ثنائي (مقفل/مفتوح) — صاحبه فقط يفتحه</td><td>حماية مورد واحد</td></tr>
<tr><td><b style="color:#818cf8">Semaphore</b></td><td>عداد — P() تُنقص، V() تُزيد</td><td>إدارة موارد متعددة</td></tr>
<tr><td><b style="color:#34d399">Monitor</b></td><td>هيكل برمجي عالي المستوى يتضمن mutex ضمنياً</td><td>Java synchronized</td></tr>
<tr><td><b style="color:#fbbf24">Spinlock</b></td><td>العملية تنتظر في حلقة (busy waiting)</td><td>الأنوية المتعددة</td></tr>
</table></div>

<div class="inter-box">
  <div class="inter-title">⚡ محاكي Race Condition — شاهد الخطر ثم الحل!</div>
  <p style="font-size:.78rem;color:#94a3b8;margin-bottom:.4rem">عداد مشترك بين عمليتين — شاهد ماذا يحدث بدون مزامنة وماذا يحدث معها</p>
  <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem">
    <button class="btn btn-re" onclick="raceRun(false)">⚡ بدون مزامنة (Race!)</button>
    <button class="btn btn-gr" onclick="raceRun(true)">🔒 مع Mutex (آمن)</button>
    <button class="btn btn-yl" onclick="raceReset()">↺ إعادة</button>
    <span style="font-size:.76rem;color:#94a3b8">العداد الصحيح = 1000</span>
  </div>
  <canvas id="raceCanvas" width="580" height="180" style="background:#0a0f1e;border-radius:8px;max-width:100%"></canvas>
  <div id="race-result" style="font-size:.8rem;text-align:center;margin-top:.3rem;min-height:22px"></div>
</div>

<h3>💀 Deadlock في المزامنة</h3>
<div class="cb r"><div class="lb" style="color:#f87171">الديدلوك عند المزامنة</div>
عملية A تمسك Mutex1 وتنتظر Mutex2 ← عملية B تمسك Mutex2 وتنتظر Mutex1 ← كلاهما ينتظر الآخر = Deadlock!
</div>

<h3>🏭 مشكلة المنتج والمستهلك (Producer-Consumer) ⭐</h3>
<div class="cb g"><div class="lb gr">الحل بالـ Semaphore</div>
<code style="color:#34d399;font-size:.78rem">
mutex = 1 (للإقصاء المتبادل)<br>
full = 0 (عدد العناصر في Buffer)<br>
empty = N (عدد الفراغات في Buffer)<br><br>
Producer: P(empty) → P(mutex) → أضف → V(mutex) → V(full)<br>
Consumer: P(full) → P(mutex) → خذ → V(mutex) → V(empty)
</code>
</div>

<div class="inter-box">
  <div class="inter-title">🏭 محاكي المنتج والمستهلك مع Semaphore</div>
  <div style="display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-bottom:.4rem">
    <button class="btn btn-gr" onclick="pcProduce()" id="btn-produce">📦 أنتج</button>
    <button class="btn btn-pu" onclick="pcConsume()" id="btn-consume">🛒 استهلك</button>
    <button class="btn btn-or" onclick="pcToggleSync()" id="btn-sync" style="border-width:2px">🔒 تزامن: مُفعّل</button>
    <button class="btn btn-yl" onclick="pcReset()">↺</button>
    <span id="pc-status" style="font-size:.74rem;color:#34d399">Buffer: 0/5</span>
  </div>
  <div style="display:flex;gap:.5rem;align-items:center;justify-content:center;margin-bottom:.3rem">
    <div style="text-align:center;font-size:.7rem;color:#34d399"><div style="font-size:1.1rem">🏭</div>أنتج: <span id="pc-prod-count">0</span></div>
    <div id="pc-buffer" style="display:flex;gap:3px;background:#0d1117;border:2px solid #334155;border-radius:7px;padding:.35rem;min-width:160px;height:42px;align-items:center"></div>
    <div style="text-align:center;font-size:.7rem;color:#818cf8"><div style="font-size:1.1rem">🛒</div>استهلك: <span id="pc-cons-count">0</span></div>
  </div>
  <div id="pc-log" style="background:#000;border-radius:5px;padding:.35rem;font-size:.68rem;font-family:monospace;max-height:70px;overflow-y:auto;color:#94a3b8">انتظار...</div>
</div>

<div class="cb y"><div class="lb yl">⭐ للاختبار</div>
• <b>Race Condition</b> = نتيجة غير متوقعة بسبب تنفيذ متزامن بدون تزامن<br>
• <b>Critical Section</b> = الجزء الذي يصل لموارد مشتركة — يحتاج حمايةً<br>
• <b>Mutual Exclusion</b> = شرط أساسي: خيط واحد فقط في CS في وقتٍ واحد<br>
• <b>Starvation</b> = عملية تنتظر إلى الأبد لأن الأولويات تُعطيها دائماً لغيرها<br>
• <b>Mutex vs Semaphore:</b> Mutex = قفل لمورد واحد | Semaphore = عداد لموارد متعددة
</div>
</div>`;

<h3>📖 شرح كل خوارزمية</h3>
<div class="cb"><div class="lb pu">1. FCFS — First Come First Served</div>
<b>أبسط خوارزمية:</b> من يأتي أولاً يُنفَّذ أولاً. لا preemption.<br>
<b>المشكلة:</b> Convoy Effect — عملية طويلة تُبطئ الجميع خلفها.<br>
<b>مثال:</b> P1=24ms, P2=3ms, P3=3ms → متوسط انتظار = (0+24+27)/3 = 17ms كبير!
</div>
<div class="cb g"><div class="lb gr">2. SJF — Shortest Job First</div>
<b>أقل متوسط انتظار:</b> العملية الأقصر تُنفَّذ أولاً.<br>
<b>المشكلة:</b> Starvation — العمليات الطويلة قد تنتظر إلى الأبد.<br>
<b>نوعان:</b> Non-preemptive و Preemptive (= SRTF - Shortest Remaining Time First) ⭐
</div>
<div class="cb o"><div class="lb or">3. Priority Scheduling</div>
<b>لكل عملية أولوية:</b> الأعلى أولوية يُنفَّذ أولاً.<br>
<b>المشكلة:</b> Starvation للأولويات المنخفضة.<br>
<b>الحل:</b> Aging = زيادة أولوية العملية كلما انتظرت أكثر.
</div>
<div class="cb y"><div class="lb yl">4. Round Robin (RR) ⭐ الأهم!</div>
<b>الأعدل:</b> كل عملية تأخذ Quantum ثم تُعاد للقائمة.<br>
<b>مناسب لـ:</b> Time-Sharing Systems والأنظمة التفاعلية.<br>
<b>Quantum صغير</b> = أفضل Response Time لكن context switch أكثر.<br>
<b>Quantum كبير</b> = يشبه FCFS.
</div>

<div class="tw"><table>
<tr><th>الخوارزمية</th><th>Preemptive?</th><th>المشكلة</th><th>الأفضل لـ</th></tr>
<tr><td>FCFS</td><td>لا</td><td>Convoy Effect</td><td>Batch Systems</td></tr>

</table></div>
</div>`;

S.t10=`<div class="card">
<h2 style="color:#f87171">💀 الموضوع العاشر: الجمود (Deadlock)</h2>

<div class="cb r"><div class="lb" style="color:#f87171">ما هو الجمود؟</div>
مجموعة عمليات في حالة انتظار دائمة — كل منها تنتظر موارد محتجزة لدى عملية أخرى في نفس المجموعة. لا أحد يتقدم = توقف تام!
</div>
<div class="ez">مثال واقعي: عاطف وأحمد في اجتماع. عاطف يمسك ورقة A وينتظر ورقة B من أحمد. أحمد يمسك ورقة B وينتظر ورقة A من عاطف. كلاهما ينتظر إلى الأبد!</div>

<h3>🛡️ التعامل مع الجمود: 4 مناهج</h3>

افترض أن الجمود نادر جداً = تجاهله. تستخدمه معظم أنظمة التشغيل العامة (Windows، Linux).
</div>

let bootOS='linux';
let bootStep=-1,bootAnim=null,bootProg=0;
function selectBootOS(os){
  bootOS=os;
  bootReset();
  // Update button styles
  ['linux','windows','macos','android'].forEach(o=>{
    const b=document.getElementById('bos-'+o);
    if(!b)return;
    const colors={linux:'#34d399',windows:'#38bdf8',macos:'#a78bfa',android:'#fb923c'};
    const c=colors[o];
    b.style.borderWidth=o===os?'2px':'1px';
    b.style.background=o===os?c+'33':'rgba(30,30,50,.5)';
  });
  // Update OS info line
  const infos={
    linux:'🐧 Linux: GRUB2 → <b style="color:#34d399">Linux Kernel (vmlinuz)</b> → systemd (PID=1) → GNOME/KDE',
    windows:'🪟 Windows: bootmgr → <b style="color:#38bdf8">NT Kernel (ntoskrnl.exe)</b> → smss.exe → Explorer',
    macos:'🍎 macOS: iBoot → <b style="color:#a78bfa">XNU Kernel (Mach+BSD)</b> → launchd (PID=1) → Finder',
    android:'🤖 Android: Fastboot → <b style="color:#fb923c">Linux Kernel (zImage)</b> → Zygote → Home Screen',
  };
  const el=document.getElementById('boot-os-info');
  if(el)el.innerHTML=infos[os]||infos.linux;
  // Update kernel step title dynamically
  const kNames={linux:'Linux Kernel',windows:'Windows NT Kernel (ntoskrnl.exe)',macos:'XNU Kernel (Mach + BSD)',android:'Linux Kernel (معدّل لـ Android)'};
  const kStep=BOOT_STEPS.find(s=>s.id==='kernel');
  if(kStep)kStep.title='تحميل النواة: '+kNames[os];
}
function renderBootSteps(){
  const el=document.getElementById('boot-steps');
  if(!el)return;
  el.innerHTML=BOOT_STEPS.map((s,i)=>`
    <div style="flex:none;text-align:center;padding:.3rem .5rem;border-radius:6px;font-size:.7rem;
      background:${i<=bootStep?s.color+'22':'rgba(30,30,50,.5)'};
      border:1px solid ${i<=bootStep?s.color:'#334155'};
      color:${i<=bootStep?s.color:'#475569'};transition:.3s">
      <div style="font-size:1rem">${s.icon}</div>
      <div style="font-weight:700">${s.label}</div>
    </div>
  `).join('');
}
function bootStart(){
  if(bootAnim)clearInterval(bootAnim);
  bootStep=-1;bootProg=0;
  document.getElementById('btn-boot-start').disabled=true;
  document.getElementById('btn-boot-next').disabled=false;
  bootNext();
}
function bootNext(){
  if(bootStep>=BOOT_STEPS.length-1){
    bootReset();return;
  }
  if(bootAnim)clearInterval(bootAnim);
  bootStep++;
  bootProg=0;
  renderBootSteps();
  const step=BOOT_STEPS[bootStep];
  // Update info
  const info=document.getElementById('boot-info');
  if(info)info.innerHTML=`<b style="color:${step.color}">${step.icon} ${step.title}</b><br><span style="color:#e2e8f0;font-size:.78rem">${step.desc}</span>`;
  const lbl=document.getElementById('boot-step-label');
  if(lbl)lbl.textContent=`المرحلة ${bootStep+1} من ${BOOT_STEPS.length}: ${step.label}`;
  // Animate progress
  const cv=document.getElementById('bootCanvas');
  if(!cv)return;
  bootAnim=setInterval(()=>{
    bootProg=Math.min(bootProg+0.015,1);
    const ctx=cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    // Dark background
    ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);
    // subtle grid
    ctx.strokeStyle='rgba(30,40,30,.3)';ctx.lineWidth=1;
    for(let gx=0;gx<cv.width;gx+=30){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,cv.height);ctx.stroke();}
    for(let gy=0;gy<cv.height;gy+=30){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(cv.width,gy);ctx.stroke();}
    // Draw step
    step.draw(ctx,cv.width,cv.height,bootProg);
    if(bootProg>=1)clearInterval(bootAnim);
  },16);
}
function bootReset(){
  if(bootAnim)clearInterval(bootAnim);
  bootStep=-1;bootProg=0;
  document.getElementById('btn-boot-start').disabled=false;
  document.getElementById('btn-boot-next').disabled=true;
  const lbl=document.getElementById('boot-step-label');
  if(lbl)lbl.textContent='اضغط "تشغيل" للبدء';
  const info=document.getElementById('boot-info');
  if(info)info.innerHTML='<span style="color:#94a3b8">👆 اضغط زر التشغيل لبدء محاكاة إقلاع الكمبيوتر...</span>';
  renderBootSteps();
  const cv=document.getElementById('bootCanvas');
  if(cv){const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);}
}

// ── Round Robin Scheduler ──────────────────────────────────────────────
let rrProcs=[],rrColors=['#818cf8','#34d399','#fb923c','#f87171','#fbbf24','#38bdf8','#a78bfa'],rrNextId=0;
function rrAdd(){
  const name=document.getElementById('rr-name')?.value||'P'+(rrNextId+1);
  const burst=parseInt(document.getElementById('rr-burst')?.value)||5;
  rrProcs.push({id:rrNextId,name,burst,color:rrColors[rrNextId%rrColors.length]});
  rrNextId++;
  // auto increment name
  const inp=document.getElementById('rr-name');
  if(inp)inp.value='P'+(rrNextId+1);
  rrRenderProcs();
}
function rrRenderProcs(){
  const el=document.getElementById('rr-procs');
  if(!el)return;
  el.innerHTML=rrProcs.map(p=>`<span style="background:${p.color}22;border:1px solid ${p.color};color:${p.color};border-radius:6px;padding:.2rem .5rem;font-size:.73rem;font-weight:700">${p.name}(${p.burst}ms)</span>`).join('');
}
function rrRun(){
  if(!rrProcs.length){alert('أضف عمليات أولاً!');return;}
  const cv=document.getElementById('rrCanvas');
  if(!cv)return;
  const q=parseInt(document.getElementById('rr-q')?.value)||3;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,cv.width,cv.height);
  // Simulate Round Robin
  const rem=rrProcs.map(p=>({...p,rem:p.burst}));
  const gantt=[];
  let done=false;
  while(!done){
    done=true;
    rem.forEach(p=>{
      if(p.rem<=0)return;
      done=false;
      const run=Math.min(p.rem,q);
      gantt.push({id:p.id,name:p.name,color:p.color,dur:run});
      p.rem-=run;
    });
  }
  // Draw Gantt chart
  const totalTime=gantt.reduce((s,g)=>s+g.dur,0);
  const scale=(cv.width-20)/totalTime;
  const barH=36,barY=40;
  ctx.fillStyle='#94a3b8';ctx.font='9px system-ui';ctx.textAlign='center';
  ctx.fillText('Gantt Chart — Round Robin (Quantum='+q+'ms)',cv.width/2,16);
  // Time axis
  ctx.strokeStyle='#334155';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(10,barY+barH+2);ctx.lineTo(cv.width-10,barY+barH+2);ctx.stroke();
  let x=10,t=0;
  gantt.forEach(g=>{
    const w=g.dur*scale;
    // bar
    ctx.fillStyle=g.color+'55';ctx.strokeStyle=g.color;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(x,barY,w,barH,4);ctx.fill();ctx.stroke();
    // label
    ctx.fillStyle=g.color;ctx.font=`bold ${w>25?9:7}px system-ui`;ctx.textAlign='center';
    ctx.fillText(g.name,x+w/2,barY+barH/2+4);
    // time tick
    ctx.fillStyle='#64748b';ctx.font='7px system-ui';ctx.textAlign='center';
    ctx.fillText(t,x,barY+barH+12);
    x+=w;t+=g.dur;
  });
  ctx.fillStyle='#64748b';ctx.font='7px system-ui';ctx.textAlign='center';
  ctx.fillText(t,x,barY+barH+12);
  // Process completion stats
  let stats='',tx=10,tt=0;
  const completion={};
  gantt.forEach(g=>{tt+=g.dur;if(!completion[g.id]||g.id in completion)completion[g.id]=tt;});
  const waited={};
  rrProcs.forEach(p=>{waited[p.id]=(completion[p.id]||0)-p.burst;});
  ctx.fillStyle='#94a3b8';ctx.font='8px system-ui';ctx.textAlign='right';
  let infoY=barY+barH+30;
  rrProcs.forEach(p=>{
    ctx.fillStyle=p.color;ctx.textAlign='left';
    ctx.fillText(`${p.name}: انتهى عند ${completion[p.id]||'?'}ms | انتظر ${waited[p.id]||0}ms`,12,infoY);
    infoY+=14;
  });
  const avgWait=(Object.values(waited).reduce((a,b)=>a+b,0)/rrProcs.length).toFixed(1);
  const statsEl=document.getElementById('rr-stats');
  if(statsEl)statsEl.textContent=`متوسط وقت الانتظار: ${avgWait}ms | الوقت الكلي: ${totalTime}ms | عدد العمليات: ${rrProcs.length}`;
}
function rrReset(){
  rrProcs=[];rrNextId=0;
  rrRenderProcs();
  const cv=document.getElementById('rrCanvas');
  if(cv){const ctx=cv.getContext('2d');ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,cv.width,cv.height);}
  const s=document.getElementById('rr-stats');if(s)s.textContent='';
  const ni=document.getElementById('rr-name');if(ni)ni.value='P1';
}

// ── Memory Allocation Game ────────────────────────────────────────────
const MA_TOTAL=16; // 16 blocks x 100MB = 1600MB
let maBlocks=Array(MA_TOTAL).fill(null);
let maAlgo='ff', maProcId=0;
const MA_COLORS=['#818cf8','#34d399','#fb923c','#f87171','#fbbf24','#38bdf8','#a78bfa','#ec4899'];
function setMemAlgo(a){
  maAlgo=a;
  ['ff','bf','wf'].forEach(x=>{
    const b=document.getElementById('ma-'+x);
    if(b)b.style.borderWidth=x===a?'2px':'1px';
  });
}
function maFindBlocks(size){
  // Find contiguous free blocks
  const holes=[];
  let i=0;
  while(i<MA_TOTAL){
    if(maBlocks[i]===null){
      let j=i;while(j<MA_TOTAL&&maBlocks[j]===null)j++;
      holes.push({start:i,len:j-i});i=j;
    } else i++;
  }
  const fits=holes.filter(h=>h.len>=size);
  if(!fits.length)return -1;
  if(maAlgo==='ff')return fits[0].start;
  if(maAlgo==='bf')return fits.sort((a,b)=>a.len-b.len)[0].start;
  if(maAlgo==='wf')return fits.sort((a,b)=>b.len-a.len)[0].start;
  return fits[0].start;
}
function maAlloc(size){
  const start=maFindBlocks(size);
  if(start===-1){maRenderStats('❌ لا توجد مساحة كافية! (External Fragmentation)');return;}
  const col=MA_COLORS[maProcId%MA_COLORS.length];
  const pname='P'+(maProcId+1);
  for(let i=start;i<start+size;i++)maBlocks[i]={pid:maProcId,name:pname,color:col};
  maProcId++;
  maRender();
}
function maFree(){
  const used=maBlocks.filter(b=>b!==null);
  if(!used.length)return;
  const victim=used[Math.floor(Math.random()*used.length)];
  maBlocks=maBlocks.map(b=>b&&b.pid===victim.pid?null:b);
  maRender();
}
function maReset(){
  maBlocks=Array(MA_TOTAL).fill(null);maProcId=0;maRender();
}
function maRender(){
  const g=document.getElementById('ma-grid');
  if(!g)return;
  const used=maBlocks.filter(Boolean).length;
  const free=MA_TOTAL-used;
  const frag=maCalcFrag();
  g.innerHTML=maBlocks.map((b,i)=>`
    <div style="flex:1;height:100%;border-radius:4px;
      background:${b?b.color+'33':'rgba(30,40,30,.4)'};
      border:1px solid ${b?b.color:'#1f2937'};
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-size:.55rem;font-weight:700;color:${b?b.color:'#334155'};
      transition:.3s;cursor:default;min-width:0" title="${b?b.name+' (100MB)':'فارغ (100MB)'}">
      ${b?b.name.slice(0,2):''}
    </div>
  `).join('');
  // Legend
  const legend=document.getElementById('ma-legend');
  const procs={};
  maBlocks.forEach(b=>{if(b)procs[b.pid]=b;});
  if(legend)legend.innerHTML=Object.values(procs).map(p=>`
    <span style="background:${p.color}22;border:1px solid ${p.color};color:${p.color};border-radius:4px;padding:.15rem .4rem;font-size:.7rem">${p.name}</span>
  `).join('')+'<span style="background:rgba(30,40,30,.4);border:1px solid #1f2937;color:#475569;border-radius:4px;padding:.15rem .4rem;font-size:.7rem">فارغ</span>';
  maRenderStats(`📊 المستخدم: ${used*100}MB / ${MA_TOTAL*100}MB | حر: ${free*100}MB | تجزئة خارجية: ${frag} فجوة${frag>1?'ات':''} | خوارزمية: ${maAlgo.toUpperCase()}`);
}
function maCalcFrag(){
  let holes=0,prev=false;
  maBlocks.forEach(b=>{
    if(!b&&prev)holes++;
    prev=!b;
  });
  return holes;
}
function maRenderStats(msg){
  const s=document.getElementById('ma-stats');if(s)s.textContent=msg;
}

let fbCwd='/',fbSelected=null,fbInodeNext=100;
function fbRender(){
  const el=document.getElementById('fb-list');
  const pathEl=document.getElementById('fb-path');
  if(!el||!pathEl)return;
  pathEl.textContent=fbCwd;
  const node=fbFS[fbCwd];
  if(!node||node.type!=='dir'){el.innerHTML='<div style="color:#f87171;padding:.5rem">خطأ في المسار</div>';return;}
  const rows=node.children.map(name=>{
    const path=(fbCwd==='/'?'/':fbCwd+'/')+name;
    const child=fbFS[path];
    if(!child)return '';
    const isDir=child.type==='dir';
    const isSelected=fbSelected===path;
    return `<div onclick="fbSelect('${path.replace(/'/g,"\\'")}',event)"
      style="display:flex;align-items:center;gap:.5rem;padding:.25rem .6rem;cursor:pointer;
        background:${isSelected?'rgba(129,140,248,.15)':'transparent'};
        border-bottom:1px solid #0d1117;transition:.15s"
      onmouseenter="if(this.style.background==='transparent')this.style.background='rgba(255,255,255,.03)'"
      onmouseleave="if('${path}'!==fbSelected)this.style.background='transparent'">
      <span>${isDir?'📁':'📄'}</span>
      <span style="flex:1;color:${isDir?'#38bdf8':'#e2e8f0'};font-weight:${isDir?'700':'400'}">${name}</span>
      <span style="color:#475569;font-size:.65rem">inode:${child.inode}</span>
      <span style="color:#475569;font-size:.65rem">${isDir?'DIR':formatSize(child.size)}</span>
    </div>`;
  }).join('');
  el.innerHTML=rows||'<div style="color:#475569;padding:.5rem;text-align:center">المجلد فارغ</div>';
}
function formatSize(bytes){
  if(bytes>1e6)return (bytes/1e6).toFixed(1)+'MB';
  if(bytes>1e3)return (bytes/1e3).toFixed(0)+'KB';
  return bytes+'B';
}
function fbSelect(path,e){
  fbSelected=path;
  fbRender();
  const node=fbFS[path];
  if(!node)return;
  const name=path.split('/').pop();
  const st=document.getElementById('fb-status');
  if(st)st.textContent=`inode: ${node.inode} | النوع: ${node.type==='dir'?'مجلد (directory)':'ملف (file)'} | الحجم: ${formatSize(node.size)} | المسار: ${path}`;
  if(e&&e.detail===2&&node.type==='dir'){fbCwd=path;fbSelected=null;fbRender();}
}
function fbUp(){
  if(fbCwd==='/'){return;}
  const parts=fbCwd.split('/').filter(Boolean);
  parts.pop();
  fbCwd=parts.length?'/'+parts.join('/'):'/'
  fbSelected=null;fbRender();
}
function fbCreate(type){
  const name=prompt(type==='dir'?'اسم المجلد الجديد:':'اسم الملف الجديد:','new'+(type==='dir'?'-folder':'-file.txt'));
  if(!name||!name.trim())return;
  const path=(fbCwd==='/'?'/':fbCwd+'/')+name.trim();
  if(fbFS[path]){alert('موجود مسبقاً!');return;}
  fbFS[path]={type,children:type==='dir'?[]:undefined,inode:fbInodeNext++,size:type==='dir'?4096:0};
  fbFS[fbCwd].children.push(name.trim());
  fbRender();
}
function fbDelete(){
  if(!fbSelected){alert('اختر ملفاً أو مجلداً أولاً!');return;}
  const name=fbSelected.split('/').pop();
  if(!confirm('حذف "'+name+'"؟'))return;
  // Remove from parent
  fbFS[fbCwd].children=fbFS[fbCwd].children.filter(c=>c!==name);
  delete fbFS[fbSelected];
  fbSelected=null;fbRender();
}

// ── Producer Consumer ────────────────────────────────────────────────────
const PC_MAX=5;
let pcBuffer=[],pcSync=true,pcProdCount=0,pcConsCount=0;
function pcProduce(){
  if(pcSync&&pcBuffer.length>=PC_MAX){
    pcLog('🔒 Buffer ممتلئ — المنتج ينتظر (Blocked)','#f87171');return;
  }
  if(!pcSync&&pcBuffer.length>=PC_MAX){
    pcLog('⚠️ Race Condition! المنتج يكتب فوق البيانات!','#f87171');
    pcBuffer[Math.floor(Math.random()*PC_MAX)]={id:pcProdCount,col:'#f87171'};
  } else {
    pcBuffer.push({id:pcProdCount,col:pcSync?'#34d399':'#fb923c'});
  }
  pcProdCount++;
  pcRender();
  pcLog(`✅ المنتج أنتج عنصر #${pcProdCount} | Buffer: ${pcBuffer.length}/${PC_MAX}`,pcSync?'#34d399':'#fb923c');
}
function pcConsume(){
  if(pcBuffer.length===0){
    pcLog('🔒 Buffer فارغ — المستهلك ينتظر (Blocked)','#818cf8');return;
  }
  const item=pcBuffer.shift();
  pcConsCount++;
  pcRender();
  pcLog(`🛒 المستهلك أخذ عنصر #${item.id} | Buffer: ${pcBuffer.length}/${PC_MAX}`,'#818cf8');
}
function pcToggleSync(){
  pcSync=!pcSync;
  const b=document.getElementById('btn-sync');
  if(b){
    b.textContent='🔒 التزامن: '+(pcSync?'مُفعّل':'مُعطّل ⚠️');
    b.style.borderColor=pcSync?'#34d399':'#f87171';
    b.style.color=pcSync?'#34d399':'#f87171';
  }
  pcLog(pcSync?'✅ التزامن مُفعّل — Semaphore يمنع التضارب':'⚠️ التزامن مُعطّل — Race Condition ممكن!',pcSync?'#34d399':'#f87171');
}
function pcReset(){
  pcBuffer=[];pcProdCount=0;pcConsCount=0;
  pcRender();
  const log=document.getElementById('pc-log');if(log)log.innerHTML='انتظار العمليات...';
}
function pcRender(){
  const buf=document.getElementById('pc-buffer');
  if(buf){
    // empty slots
    const all=[];
    for(let i=0;i<PC_MAX;i++){
      const item=pcBuffer[i];
      all.push(`<div style="width:28px;height:28px;border-radius:4px;border:1px solid ${item?item.col:'#334155'};
        background:${item?item.col+'33':'rgba(30,30,50,.5)'};display:flex;align-items:center;justify-content:center;
        font-size:.6rem;color:${item?item.col:'#334155'};font-weight:bold">${item?'#'+item.id:''}</div>`);
    }
    buf.innerHTML=all.join('');
  }
  const pc=document.getElementById('pc-prod-count');if(pc)pc.textContent='أنتج: '+pcProdCount;
  const cc=document.getElementById('pc-cons-count');if(cc)cc.textContent='استهلك: '+pcConsCount;
  const st=document.getElementById('pc-status');if(st)st.textContent='Buffer: '+pcBuffer.length+' / '+PC_MAX+' عناصر';
}
function pcLog(msg,col){
  const el=document.getElementById('pc-log');
  if(!el)return;
  el.innerHTML=`<span style="color:${col||'#94a3b8'}">${msg}</span>\n`+el.innerHTML;
}

const BS_ORDER=['Power On','BIOS/POST','Bootloader','Kernel','Init/Services','Desktop'];
const BS_COLORS=['#fbbf24','#fb923c','#818cf8','#38bdf8','#34d399','#a78bfa'];
let bsShuffled=[],bsNext=0,bsScore=0,bsRight=0,bsWrong=0;
function bsStart(){
  bsShuffled=[...BS_ORDER].sort(()=>Math.random()-.5);
  bsNext=0;bsScore=0;bsRight=0;bsWrong=0;
  bsRender();
  const _bsd=document.getElementById('bs-done');if(_bsd)_bsd.innerHTML='<span style="font-size:.72rem;color:#334155;align-self:center">الترتيب الصحيح ←</span>';
  const _bsm=document.getElementById('bs-msg');if(_bsm)_bsm.textContent='';
  bsUpdateScore();
}
function bsRender(){
  const el=document.getElementById('bs-cards');
  if(!el)return;
  el.innerHTML=bsShuffled.map((s,i)=>`
    <div onclick="bsPick(${i})" data-i="${i}"
      style="padding:.35rem .7rem;background:rgba(129,140,248,.1);border:2px solid rgba(129,140,248,.3);
             border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:700;color:#e2e8f0;
             transition:all .15s;user-select:none"
      onmouseenter="this.style.borderColor='#818cf8';this.style.background='rgba(129,140,248,.25)'"
      onmouseleave="this.style.borderColor='rgba(129,140,248,.3)';this.style.background='rgba(129,140,248,.1)'">
      ${s}
    </div>
  `).join('');
}
function bsPick(i){
  const name=bsShuffled[i];
  const correct=BS_ORDER[bsNext];
  const msg=document.getElementById('bs-msg');
  const done=document.getElementById('bs-done');
  const col=BS_COLORS[bsNext];
  if(name===correct){
    bsRight++;bsScore+=10;bsNext++;
    // Move card to done
    done.innerHTML+=`<div style="padding:.3rem .6rem;background:${col}22;border:2px solid ${col};border-radius:6px;font-size:.74rem;color:${col};font-weight:700">${BS_ORDER.indexOf(name)+1}. ${name}</div>`;
    bsShuffled.splice(i,1);
    if(msg)msg.innerHTML=`<span style="color:#34d399">✅ صح! +10 نقطة</span>`;
    bsRender();
    if(bsNext===BS_ORDER.length){
      if(msg)msg.innerHTML=`<span style="color:#fbbf24">🏆 ممتاز! أكملت الترتيب الصحيح! نقاطك: ${bsScore}</span>`;
    }
  } else {
    bsWrong++;bsScore=Math.max(0,bsScore-5);
    if(msg)msg.innerHTML=`<span style="color:#f87171">❌ خطأ! المرحلة الصحيحة الآن هي: "${correct}" (-5 نقاط)</span>`;
    // Flash the wrong card red
    const cards=document.getElementById('bs-cards');
    const wrongEl=cards?.children[i];
    if(wrongEl){wrongEl.style.borderColor='#ef4444';wrongEl.style.background='rgba(239,68,68,.2)';setTimeout(()=>bsRender(),600);}
  }
  bsUpdateScore();
}
function bsUpdateScore(){
  const el=document.getElementById('bs-score');
  if(el)el.textContent=`النقاط: ${bsScore} | الصح: ${bsRight} | الخطأ: ${bsWrong}`;
}
function bsReset(){bsShuffled=[];bsNext=0;bsScore=0;bsRight=0;bsWrong=0;
  const c=document.getElementById('bs-cards');if(c)c.innerHTML='';
  const d=document.getElementById('bs-done');if(d)d.innerHTML='<span style="font-size:.72rem;color:#334155;align-self:center">الترتيب الصحيح ←</span>';
  const m=document.getElementById('bs-msg');if(m)m.textContent='';
  bsUpdateScore();
}

const CM_PAIRS=[
  {term:'نظام التشغيل',def:'وسيط بين المستخدم وعتاد الحاسب'},
  {term:'PCB',def:'بطاقة هوية العملية — تحتوي PID والحالة'},

  {term:'Deadlock',def:'طريق مسدود — عمليات تنتظر بعضها'},
  {term:'DMA',def:'نقل البيانات مباشرة بدون CPU'},
  {term:'Virtual Memory',def:'ذاكرة أكبر من RAM الفعلية'},
  {term:'Semaphore',def:'متغير للتزامن بين العمليات'},

];
let cmSelected=null,cmMatched=0,cmScore=0,cmTimer=null,cmTime=60;
function cmStart(){
  cmSelected=null;cmMatched=0;cmScore=0;cmTime=60;
  if(cmTimer)clearInterval(cmTimer);
  cmRender();
  cmTimer=setInterval(()=>{
    cmTime--;
    const t=document.getElementById('cm-timer');
    if(t)t.textContent=`⏱ ${cmTime}s`;
    t.style.color=cmTime<15?'#f87171':'#fbbf24';
    if(cmTime<=0){clearInterval(cmTimer);cmEnd();}
  },1000);
}
function cmRender(){
  const board=document.getElementById('cm-board');
  if(!board)return;
  // Mix terms and defs
  const items=[
    ...CM_PAIRS.map((p,i)=>({id:'t'+i,type:'term',text:p.term,pair:i})),
    ...CM_PAIRS.map((p,i)=>({id:'d'+i,type:'def',text:p.def,pair:i})),
  ].sort(()=>Math.random()-.5);
  board.innerHTML=items.map(it=>`
    <div id="cm-${it.id}" onclick="cmPick('${it.id}',${it.pair},'${it.type}')"
      style="padding:.4rem .5rem;background:rgba(56,189,248,.08);border:1.5px solid rgba(56,189,248,.2);
             border-radius:7px;cursor:pointer;font-size:.73rem;color:#e2e8f0;text-align:center;
             transition:.15s;line-height:1.5;user-select:none"
      onmouseenter="if(!this.dataset.done)this.style.borderColor='#38bdf8'"
      onmouseleave="if(!this.dataset.done&&this.id!==cmSelectedId)this.style.borderColor='rgba(56,189,248,.2)'">
      ${it.text}
    </div>
  `).join('');
}
let cmSelectedId='',cmSelectedPair=-1;
function cmPick(id,pair,type){
  const el=document.getElementById('cm-'+id);
  if(!el||el.dataset.done)return;
  if(cmSelectedId===''){
    cmSelectedId=id;cmSelectedPair=pair;
    el.style.borderColor='#fbbf24';el.style.background='rgba(251,191,36,.15)';
  } else if(cmSelectedId===id){
    el.style.borderColor='rgba(56,189,248,.2)';el.style.background='rgba(56,189,248,.08)';
    cmSelectedId='';cmSelectedPair=-1;
  } else {
    // Check match
    const prev=document.getElementById('cm-'+cmSelectedId);
    if(pair===cmSelectedPair&&id!==cmSelectedId){
      // Match!
      cmMatched++;cmScore+=10;
      [el,prev].filter(Boolean).forEach(e=>{e.style.borderColor='#34d399';e.style.background='rgba(52,211,153,.2)';e.style.color='#34d399';e.dataset.done='1';e.onclick=null;});
      const msg=document.getElementById('cm-msg');if(msg)msg.innerHTML='<span style="color:#34d399">✅ مطابقة صحيحة! +10</span>';
      if(cmMatched===CM_PAIRS.length){clearInterval(cmTimer);cmEnd();}
    } else {
      // Wrong
      [el,prev].filter(Boolean).forEach(e=>{e.style.borderColor='#ef4444';e.style.background='rgba(239,68,68,.15)';});
      setTimeout(()=>{
        [el,prev].forEach(e=>{if(!e.dataset.done){e.style.borderColor='rgba(56,189,248,.2)';e.style.background='rgba(56,189,248,.08)';}});
      },700);
      const msg=document.getElementById('cm-msg');if(msg)msg.innerHTML='<span style="color:#f87171">❌ ليست مطابقة — حاول مجدداً</span>';
    }
    cmSelectedId='';cmSelectedPair=-1;
    const sc=document.getElementById('cm-score');
    if(sc)sc.textContent=`نقاط: ${cmScore} | متبقي: ${CM_PAIRS.length-cmMatched}`;
  }
}
function cmEnd(){
  const msg=document.getElementById('cm-msg');
  if(msg)msg.innerHTML=`<span style="color:#fbbf24">🏆 انتهت اللعبة! نقاطك: ${cmScore} | مطابقات: ${cmMatched}/${CM_PAIRS.length}</span>`;
}

const OS_TYPES=['Batch','Time Sharing','Real-Time','Distributed','Multiprocessor'];

let osIdx=0,osScore=0,osActive=false;
function osStart(){

let osQueue=[];
function osShowQ(){

  const _osm=document.getElementById('os-msg');if(_osm)_osm.textContent='';
  const _osc=document.getElementById('os-score');if(_osc)_osc.textContent=`نقاط: ${osScore} | جولة: ${osIdx+1}/10`;

             border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:700;color:${OS_COLORS[t]};

}
function osPick(type){

    if(msg)msg.innerHTML=`<span style="color:#34d399">✅ صح! +10 — ${sc.e}</span>`;
  } else {
    if(msg)msg.innerHTML=`<span style="color:#f87171">❌ خطأ! الجواب: ${sc.a} — ${sc.e}</span>`;
  }

function osEnd(){

// GAME 5: Memory Survivor
// ════════════════════════════════════════════════════════════════
const MS_MAX=12;
let msBlocks=[],msScore=0,msLevel=1,msInterval=null,msTimer=null,msTime=0,msRunning=false;
const MS_PROC_SIZES={small:1,medium:2,large:3};
const MS_NAMES=['Chrome','VSCode','Excel','Zoom','Firefox','Photoshop','Steam','Discord','Spotify','Teams'];
const MS_COLS=['#818cf8','#34d399','#fb923c','#f87171','#fbbf24','#38bdf8','#a78bfa','#ec4899','#06b6d4','#84cc16'];
let msProcId=0;
function msStart(){
  msBlocks=[];msScore=0;msLevel=1;msProcId=0;msTime=0;msRunning=true;
  if(msInterval)clearInterval(msInterval);
  if(msTimer)clearInterval(msTimer);
  msTimer=setInterval(()=>{
    msTime++;
    const t=document.getElementById('ms-timer');
    if(t)t.textContent=`⏱ ${msTime}s`;
    if(msTime%10===0){msScore++;msLevel=Math.floor(msTime/20)+1;msUpdateUI();}
  },1000);
  // Add processes periodically, faster each level
  msInterval=setInterval(()=>{
    if(!msRunning)return;
    const size=Math.random()<.5?1:Math.random()<.6?2:3;
    const free=MS_MAX-msBlocks.reduce((s,b)=>s+b.size,0);
    if(free<size){
      // Game over
      msRunning=false;clearInterval(msInterval);clearInterval(msTimer);
      const msg=document.getElementById('ms-msg');
      if(msg)msg.innerHTML=`<span style="color:#f87171">💥 امتلأت الذاكرة! (Internal Fragmentation) — نقاطك: ${msScore} | نجت لـ ${msTime} ثانية</span>`;
      return;
    }
    msBlocks.push({id:msProcId,name:MS_NAMES[msProcId%MS_NAMES.length],size,col:MS_COLS[msProcId%MS_COLS.length]});
    msProcId++;
    msUpdateUI();
  },Math.max(1500-msLevel*200,600));
  msUpdateUI();
}
function msFree(){
  if(!msRunning||!msBlocks.length)return;
  msBlocks.shift();msScore+=2;msUpdateUI();
  const msg=document.getElementById('ms-msg');
  if(msg)msg.innerHTML='<span style="color:#34d399">✅ تم تحرير عملية! +2 نقطة</span>';
}
function msStop(){msRunning=false;if(msInterval)clearInterval(msInterval);if(msTimer)clearInterval(msTimer);}
function msUpdateUI(){
  const cv=document.getElementById('msCanvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,cv.width,cv.height);
  // Memory bar
  const barW=cv.width-30,barY=30,barH=40;
  ctx.fillStyle='rgba(30,40,30,.5)';ctx.strokeStyle='#334155';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(15,barY,barW,barH,6);ctx.fill();ctx.stroke();
  // Draw blocks
  const usedBlocks=msBlocks.reduce((s,b)=>s+b.size,0);
  let bx=15;
  msBlocks.forEach(b=>{
    const bw=(b.size/MS_MAX)*barW;
    ctx.fillStyle=b.col+'44';ctx.strokeStyle=b.col;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(bx,barY+2,bw-2,barH-4,4);ctx.fill();ctx.stroke();
    ctx.fillStyle=b.col;ctx.font='bold 8px system-ui';ctx.textAlign='center';
    ctx.fillText(b.name.slice(0,6),bx+bw/2,barY+22);
    ctx.fillStyle='#94a3b8';ctx.font='7px system-ui';
    ctx.fillText(b.size*100+'MB',bx+bw/2,barY+34);
    bx+=bw;
  });
  // Free space
  const freeW=barW-bx+15;
  if(freeW>10){
    ctx.fillStyle='rgba(52,211,153,.08)';ctx.strokeStyle='rgba(52,211,153,.3)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.roundRect(bx,barY+2,freeW-2,barH-4,4);ctx.fill();ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#334155';ctx.font='8px system-ui';ctx.textAlign='center';
    ctx.fillText('حر: '+(MS_MAX-usedBlocks)*100+'MB',bx+freeW/2,barY+24);
  }
  // Labels
  ctx.fillStyle='#94a3b8';ctx.font='8.5px system-ui';ctx.textAlign='right';
  ctx.fillText(`RAM: ${usedBlocks*100}MB / ${MS_MAX*100}MB مستخدم`,cv.width-12,barY+barH+20);
  // Danger level bar
  const danger=usedBlocks/MS_MAX;
  const dangerColor=danger>.8?'#f87171':danger>.5?'#fbbf24':'#34d399';
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.roundRect(15,barY+barH+8,barW,8,3);ctx.fill();
  ctx.fillStyle=dangerColor;ctx.beginPath();ctx.roundRect(15,barY+barH+8,barW*danger,8,3);ctx.fill();
  ctx.fillStyle=dangerColor;ctx.font='7.5px system-ui';ctx.textAlign='left';
  ctx.fillText(danger>.8?'⚠️ خطر! الذاكرة تكاد تمتلئ!':danger>.5?'⚡ تحذير: أكثر من نصف الذاكرة مستخدمة':'✅ الذاكرة بخير',18,barY+barH+30);
  const sc=document.getElementById('ms-score');
  if(sc)sc.textContent=`نقاط: ${msScore} | مستوى: ${msLevel} | عمليات: ${msBlocks.length}`;
  if(!document.getElementById('msCanvas')&&msRunning){msStop();}
}


function cleanupGames(){
  // Stop all game timers when leaving games tab
  if(typeof cmTimer!=='undefined'&&cmTimer){clearInterval(cmTimer);cmTimer=null;}
  if(typeof tfTimer!=='undefined'&&tfTimer){clearInterval(tfTimer);tfTimer=null;}
  if(typeof msInterval!=='undefined'&&msInterval){clearInterval(msInterval);msInterval=null;}
  if(typeof msTimer!=='undefined'&&msTimer){clearInterval(msTimer);msTimer=null;}
  // Reset volatile state
  if(typeof tfActive!=='undefined')tfActive=false;
  if(typeof osActive!=='undefined')osActive=false;
  if(typeof msRunning!=='undefined')msRunning=false;
  if(typeof cmSelectedId!=='undefined'){cmSelectedId='';cmSelectedPair=-1;}
}

function hwDraw(cv,hov){
  const ctx=cv.getContext('2d');

  ctx.fillStyle='#0a0e18';ctx.fillRect(0,0,w,h);

  for(let x=0;x<w;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}

  Object.entries(HW_DATA).forEach(([id,d])=>{
    const [x1,y1,x2,y2]=d.bounds;
    const isHov=hov===id||hwHighlight===id;
    ctx.save();

    if(isHov){ctx.shadowColor=d.col;ctx.shadowBlur=18;}

    ctx.fillStyle=d.col+(Math.round(alpha*255).toString(16).padStart(2,'0'));
    ctx.strokeStyle=isHov?d.col:d.col+'99';

function hwGetComp(e){
  const cv=document.getElementById('hwCanvas');
  if(!cv)return null;
  const r=cv.getBoundingClientRect();
  const sx=cv.width/r.width,sy=cv.height/r.height;
  const x=(e.clientX-r.left)*sx,y=(e.clientY-r.top)*sy;
  for(const [id,d] of Object.entries(HW_DATA)){
    const [x1,y1,x2,y2]=d.bounds;
    if(x>=x1&&x<=x2&&y>=y1&&y<=y2)return id;
  }
  return null;
}

// GAME 6: CPU Fetch-Decode-Execute Cycle
// ════════════════════════════════════════════════════════════════
const CPU_INSTS=[
  {inst:'ADD R1, R2, R3',explain:'① Fetch: RAM[PC]→IR ② Decode: R2+R3 ③ Execute: ALU يجمع ④ Write: R1=نتيجة',ops:['جلب ADD من RAM إلى IR','فك الترميز: نوع=حساب، معاملات=R2,R3','ALU يُجري الجمع','نتيجة الجمع تُكتب في R1']},
  {inst:'LOAD R4, [0xFF00]',explain:'① Fetch ② Decode: قراءة ذاكرة ③ Execute: اقرأ عنوان 0xFF00 ④ Write: R4',ops:['جلب LOAD من RAM','فك الترميز: نوع=قراءة ذاكرة','الوصول لعنوان 0xFF00 في RAM','تحميل القيمة في R4']},
  {inst:'MUL R5, R1, R4',explain:'① Fetch ② Decode: ضرب ③ Execute: ALU يضرب ④ Write: R5',ops:['جلب MUL من RAM','فك الترميز: نوع=ضرب، R1×R4','ALU يُجري الضرب (أبطأ من الجمع)','النتيجة في R5 + تحديث Flags']},
  {inst:'JMP 0x200',explain:'① Fetch ② Decode: قفز ③ Execute: PC=0x200 ④ لا Write-back',ops:['جلب JMP من RAM','فك الترميز: نوع=قفز غير مشروط','تحديث PC=0x200 مباشرة','لا حاجة لـ Write-back (تغيير في PC فقط)']},
  {inst:'CMP R1, R6',explain:'① Fetch ② Decode: مقارنة ③ Execute: ALU يطرح ④ Write: Flags فقط',ops:['جلب CMP من RAM','فك الترميز: مقارنة R1 مع R6','ALU يطرح (R1-R6) دون حفظ النتيجة','يُحدّث Flags فقط: Zero, Negative, Overflow']},
];
let cpuInst=0,cpuPhase=0,cpuScore=0,cpuActive=false,cpuPipeline=[];
function cpuStart(){
  cpuInst=0;cpuPhase=0;cpuScore=0;cpuPipeline=[];cpuActive=true;
  cpuShowInst();
}
function cpuShowInst(){
  if(cpuInst>=CPU_INSTS.length){cpuEnd();return;}
  const inst=CPU_INSTS[cpuInst];
  cpuPhase=0;
  const iEl=document.getElementById('cpu-inst');
  if(iEl)iEl.innerHTML=`<b style="color:#fbbf24">التعليمة ${cpuInst+1}: </b><code style="color:#38bdf8;font-size:.9rem">${inst.inst}</code><br><span style="font-size:.72rem;color:#94a3b8">${inst.explain}</span>`;
  // Enable all buttons
  for(let i=0;i<4;i++){const b=document.getElementById('cpu-btn'+i);if(b)b.disabled=false;}
  const msg=document.getElementById('cpu-msg');if(msg)msg.textContent='اضغط الخطوات بالترتيب الصحيح: Fetch → Decode → Execute → Write-back';
  cpuRenderPipeline();
}
function cpuStep(phase){
  if(!cpuActive)return;
  const msg=document.getElementById('cpu-msg');
  const inst=CPU_INSTS[cpuInst];
  if(phase===cpuPhase){
    // Correct!
    cpuScore+=5;cpuPipeline.push({phase,ok:true,label:['Fetch','Decode','Execute','Write-back'][phase]});
    if(msg)msg.innerHTML=`<span style="color:#34d399">✅ صح! ${inst.ops[phase]} (+5 نقاط)</span>`;
    // Highlight current button
    const b=document.getElementById('cpu-btn'+phase);
    if(b){b.style.background=['rgba(248,113,113,.35)','rgba(251,146,60,.35)','rgba(52,211,153,.35)','rgba(129,140,248,.35)'][phase];b.disabled=true;}
    cpuPhase++;
    cpuRenderPipeline();
    if(cpuPhase===4){
      // Instruction complete
      cpuInst++;cpuScore+=10;
      const sc=document.getElementById('cpu-score');
      if(sc)sc.textContent=`نقاط: ${cpuScore} | تعليمة: ${cpuInst}/5`;
      setTimeout(cpuShowInst,1200);
    }
  } else {
    // Wrong
    cpuPipeline.push({phase,ok:false,label:['Fetch','Decode','Execute','Write-back'][phase]});
    if(msg)msg.innerHTML=`<span style="color:#f87171">❌ خطأ! الخطوة الصحيحة الآن هي: ${['Fetch','Decode','Execute','Write-back'][cpuPhase]}</span>`;
    cpuScore=Math.max(0,cpuScore-2);
    cpuRenderPipeline();
  }
  const sc=document.getElementById('cpu-score');
  if(sc)sc.textContent=`نقاط: ${cpuScore} | تعليمة: ${cpuInst}/5`;
}
function cpuRenderPipeline(){
  const el=document.getElementById('cpu-pipeline');
  if(!el)return;
  const phases=['Fetch','Decode','Execute','Write'];
  const colors=['#f87171','#fb923c','#34d399','#818cf8'];
  el.innerHTML=phases.map((p,i)=>{
    const done=i<cpuPhase;
    const active=i===cpuPhase;
    return `<div style="flex:1;text-align:center;padding:.3rem;border-radius:5px;
      background:${done?colors[i]+'33':active?colors[i]+'15':'rgba(30,30,50,.5)'};
      border:1px solid ${done||active?colors[i]:'#334155'};
      color:${done||active?colors[i]:'#475569'};font-size:.72rem;font-weight:700;transition:.3s">
      ${done?'✓ ':active?'▶ ':''}${p}
    </div>`;
  }).join('<div style="color:#475569;font-size:.8rem;align-self:center;padding:0 .15rem">→</div>');
}
function cpuEnd(){
  cpuActive=false;
  for(let i=0;i<4;i++){const b=document.getElementById('cpu-btn'+i);if(b)b.disabled=true;}
  const inst=document.getElementById('cpu-inst');
  if(inst)inst.innerHTML=`<b style="color:#fbbf24">🏆 ممتاز! أنجزت 5 تعليمات!</b><br><span style="color:#e2e8f0">نقاطك: ${cpuScore} — أتقنت دورة المعالج Fetch→Decode→Execute→Write-back</span>`;
  const msg=document.getElementById('cpu-msg');if(msg)msg.textContent='';
}
function cpuStop(){
  cpuActive=false;
  for(let i=0;i<4;i++){const b=document.getElementById('cpu-btn'+i);if(b)b.disabled=true;}
  const inst=document.getElementById('cpu-inst');if(inst)inst.textContent='تم الإيقاف. اضغط "ابدأ" من جديد.';
}

const IRQ_DEVS={

  disk:{name:'💾 قرص صلب',col:'#34d399',irq:'IRQ 14/15',isr:'Disk ISR',steps:['عملية القراءة/الكتابة اكتملت في SSD/HDD','DMA Controller يُرسل مقاطعة للـ CPU','CPU يحفظ حالته الحالية','يُنفّذ Disk ISR','ينقل البيانات من DMA Buffer للـ RAM','يُنبّه العملية المنتظرة أن البيانات جاهزة','يعود للجدولة']},

  timer:{name:'⏱️ مؤقت',col:'#fbbf24',irq:'IRQ 0',isr:'Timer ISR',steps:['Timer Chip يُطلق إشارة كل 10ms','هذه أهم مقاطعة! تُتيح Multitasking','CPU يوقف العملية الحالية','يحفظ كامل Context في PCB','OS Scheduler يختار العملية التالية','يُحمّل Context العملية الجديدة','يبدأ تنفيذها — هذا هو Time Sharing!']}
};
let irqAnim=null,irqStep=0;
function irqFire(dev){
  if(irqAnim)clearInterval(irqAnim);
  const d=IRQ_DEVS[dev];
  irqStep=0;
  const info=document.getElementById('irq-info');
  const cv=document.getElementById('irqCanvas');
  if(!cv)return;
  irqDrawStep(cv,d,0);
  if(info)info.innerHTML=`<b style="color:${d.col}">${d.name} — ${d.irq}</b> | ISR: <code>${d.isr}</code><br><span style="color:#94a3b8;font-size:.72rem">الخطوة 1/${d.steps.length}: ${d.steps[0]}</span>`;
  irqAnim=setInterval(()=>{
    irqStep++;
    if(irqStep>=d.steps.length){clearInterval(irqAnim);irqAnim=null;return;}
    irqDrawStep(cv,d,irqStep);
    const i2=document.getElementById('irq-info');
    if(i2)i2.innerHTML=`<b style="color:${d.col}">${d.name} — ${d.irq}</b><br><span style="color:#94a3b8;font-size:.72rem">الخطوة ${irqStep+1}/${d.steps.length}: ${d.steps[irqStep]}</span>`;
  },1200);
}
function irqDrawStep(cv,d,step){
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,w,h);
  // Zones: Device | PIC | CPU | ISR
  const zones=[
    {x:10,y:20,w:100,h:180,label:'الجهاز',col:d.col},
    {x:130,y:30,w:110,h:160,label:'Interrupt Controller',col:'#fb923c'},
    {x:260,y:20,w:150,h:180,label:'CPU + Stack',col:'#fbbf24'},
    {x:430,y:20,w:160,h:180,label:'ISR + Buffer',col:'#818cf8'},
  ];
  zones.forEach(z=>{
    ctx.fillStyle=z.col+'11';ctx.strokeStyle=z.col+'55';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(z.x,z.y,z.w,z.h,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=z.col;ctx.font='bold 8.5px system-ui';ctx.textAlign='center';
    ctx.fillText(z.label,z.x+z.w/2,z.y+14);
  });
  // Device
  ctx.font='28px system-ui';ctx.textAlign='center';ctx.fillText(d.name.split(' ')[0],60,110);
  ctx.fillStyle=d.col;ctx.font='8px system-ui';ctx.fillText(d.irq,60,135);
  // PIC
  ctx.fillStyle='#fb923c';ctx.font='bold 9px system-ui';ctx.textAlign='center';
  ctx.fillText('PIC/APIC',185,80);
  const irqLines=['IRQ 0 (Timer)','IRQ 1 (Keyboard)','IRQ 9 (Network)','IRQ 14 (Disk)'];
  irqLines.forEach((l,i)=>{
    const active=l.includes(d.irq.split(' ')[0]);
    ctx.fillStyle=active&&step>0?d.col:'#334155';ctx.font='7px monospace';ctx.textAlign='left';
    ctx.fillText(l,133,100+i*18);
  });
  // CPU
  ctx.fillStyle='#fbbf24';ctx.font='bold 9px system-ui';ctx.textAlign='center';
  ctx.fillText('CPU',335,80);
  const cpuStates=['Running Process A','⚠️ INTERRUPT!','Save Context','Execute ISR','Restore + Return'];
  const activeState=step<1?0:step<2?1:step<4?2:step<6?3:4;
  cpuStates.forEach((s,i)=>{
    const on=i===activeState;
    ctx.fillStyle=on?'#fbbf24':on?'#fbbf24':'#334155';
    ctx.font=on?'bold 8px system-ui':'7.5px system-ui';ctx.textAlign='center';
    ctx.fillText(s,335,100+i*20);
  });
  // ISR box
  ctx.fillStyle='#818cf8';ctx.font='bold 8.5px system-ui';ctx.textAlign='center';
  ctx.fillText(d.isr,510,80);
  if(step>=3){
    ctx.fillStyle='rgba(129,140,248,.2)';ctx.strokeStyle='#818cf8';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(435,90,150,60,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='#94a3b8';ctx.font='7.5px system-ui';ctx.textAlign='center';
    ctx.fillText('Local Buffer',510,108);
    ctx.fillStyle='#34d399';ctx.font='7px monospace';
    const bytes=Array(Math.min(step-2,8)).fill('').map((_,i)=>`0x${(i*16+step*4).toString(16).padStart(2,'0')}`);
    ctx.fillText(bytes.slice(-3).join(' '),510,125);
  }
  // Animated arrow showing current step
  const arrows=[[60,100,130,110],[240,95,260,95],[410,95,430,95]];
  if(step>0&&step<=arrows.length){
    const arr=arrows[step-1];
    ctx.strokeStyle=d.col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(arr[0],arr[1]);ctx.lineTo(arr[2],arr[3]);
    ctx.stroke();
    ctx.fillStyle=d.col;
    const angle=Math.atan2(arr[3]-arr[1],arr[2]-arr[0]);
    ctx.beginPath();ctx.moveTo(arr[2],arr[3]);
    ctx.lineTo(arr[2]-10*Math.cos(angle-0.4),arr[3]-10*Math.sin(angle-0.4));
    ctx.lineTo(arr[2]-10*Math.cos(angle+0.4),arr[3]-10*Math.sin(angle+0.4));
    ctx.closePath();ctx.fill();
  }
  // Step indicator bottom
  ctx.fillStyle='#64748b';ctx.font='8px system-ui';ctx.textAlign='center';
  ctx.fillText(`الخطوة ${step+1}/${d.steps.length}: ${d.steps[step]}`,w/2,h-10);
}
function irqReset(){
  if(irqAnim)clearInterval(irqAnim);irqAnim=null;irqStep=0;
  const cv=document.getElementById('irqCanvas');
  if(cv){const ctx=cv.getContext('2d');ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,cv.width,cv.height);}

}

  {s:'عملية Orphan: أبوها انتهى قبلها وتبناها init',states:['New','Ready','Running','Waiting','Terminated'],a:'Running',e:'الأيتام يكملون تنفيذهم تحت init'},
];
let psIdx=0,psScore=0,psTmr=null,psSecs=5,psActive=false,psQueue=[];
function psStart(){
  psActive=true;psIdx=0;psScore=0;
  psQueue=[...PS_QS].sort(()=>Math.random()-.5).slice(0,10);
  psShowQ();
}
function psShowQ(){
  if(psIdx>=psQueue.length){psEnd();return;}
  const q=psQueue[psIdx];
  const s=document.getElementById('ps-scenario');if(s)s.textContent=q.s;
  const sc=document.getElementById('ps-score');if(sc)sc.textContent=`نقاط: ${psScore} | جولة: ${psIdx+1}/10`;
  const m=document.getElementById('ps-msg');if(m)m.textContent='';
  const ch=document.getElementById('ps-choices');
  if(ch)ch.innerHTML=q.states.map(st=>`
    <button onclick="psAns('${st}')"
      style="padding:.3rem .7rem;background:rgba(129,140,248,.1);border:2px solid rgba(129,140,248,.3);border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:700;color:#818cf8;font-family:inherit;transition:.15s"
      onmouseenter="this.style.background='rgba(129,140,248,.3)'" onmouseleave="this.style.background='rgba(129,140,248,.1)'">
      ${st}
    </button>`).join('');
  psSecs=5;
  if(psTmr)clearInterval(psTmr);
  psTmr=setInterval(()=>{
    psSecs--;
    const t=document.getElementById('ps-timer');
    if(t){t.textContent=`⏱ ${psSecs}s`;t.style.color=psSecs<3?'#f87171':'#fbbf24';}
    if(psSecs<=0){clearInterval(psTmr);psAns(null);}
  },1000);
}
function psAns(ans){
  if(!psActive)return;
  clearInterval(psTmr);
  const q=psQueue[psIdx];
  const m=document.getElementById('ps-msg');
  if(ans===q.a){psScore+=10;if(m)m.innerHTML=`<span style="color:#34d399">✅ صح! +10 — ${q.e}</span>`;}
  else{if(m)m.innerHTML=`<span style="color:#f87171">❌ الجواب: ${q.a} — ${q.e}</span>`;}
  psIdx++;
  const sc=document.getElementById('ps-score');if(sc)sc.textContent=`نقاط: ${psScore} | جولة: ${psIdx}/10`;
  if(document.getElementById('ps-scenario'))setTimeout(psShowQ,1500);
}
function psEnd(){
  psActive=false;clearInterval(psTmr);
  const s=document.getElementById('ps-scenario');
  if(s)s.innerHTML=`<b style="color:#fbbf24">🏆 انتهت اللعبة! نقاطك: ${psScore}/100</b>`;
  const ch=document.getElementById('ps-choices');if(ch)ch.innerHTML='';
}

// ═══════════════════════════════════════════════════════════
// GAME 7: Stack Push/Pop
// ═══════════════════════════════════════════════════════════
let stkStack=[];
const STK_MAX=8;
const STK_COLS=['#818cf8','#34d399','#fb923c','#f87171','#fbbf24','#38bdf8','#a78bfa','#ec4899'];
function stkPush(){
  const inp=document.getElementById('stk-val');
  const val=parseInt(inp?.value||'0');
  if(stkStack.length>=STK_MAX){
    const m=document.getElementById('stk-msg');
    if(m)m.innerHTML='<span style="color:#f87171">⚠️ Stack Overflow! المكدس ممتلئ — لا يمكن إضافة المزيد</span>';
    return;
  }
  stkStack.push(val);
  if(inp){inp.value=Math.floor(Math.random()*99)+1;}
  stkRender('PUSH','push: '+val+' → Stack[SP='+( stkStack.length-1)+'] = '+val);
}
function stkPop(){
  if(!stkStack.length){
    const m=document.getElementById('stk-msg');
    if(m)m.innerHTML='<span style="color:#f87171">⚠️ Stack Underflow! المكدس فارغ</span>';
    return;
  }
  const val=stkStack.pop();
  stkRender('POP','pop: ← '+val+' أُخذ من القمة | SP الآن = '+(stkStack.length-1));
}
function stkPeek(){
  if(!stkStack.length){const m=document.getElementById('stk-msg');if(m)m.innerHTML='<span style="color:#f87171">المكدس فارغ</span>';return;}
  const val=stkStack[stkStack.length-1];
  const m=document.getElementById('stk-msg');
  if(m)m.innerHTML=`<span style="color:#38bdf8">👁️ PEEK: القمة = ${val} | SP = ${stkStack.length-1} (لم تُحذف)</span>`;
}
function stkRender(op,desc){
  const vis=document.getElementById('stk-visual');
  const ptr=document.getElementById('stk-ptr');
  const info=document.getElementById('stk-info');
  const msg=document.getElementById('stk-msg');
  if(vis){
    vis.innerHTML=stkStack.map((v,i)=>`
      <div style="width:64px;height:28px;border-radius:4px;
        background:${STK_COLS[i%STK_COLS.length]}22;
        border:${i===stkStack.length-1?'2px':'1px'} solid ${STK_COLS[i%STK_COLS.length]};
        display:flex;align-items:center;justify-content:space-between;padding:0 6px;
        font-size:.72rem;color:${STK_COLS[i%STK_COLS.length]};font-family:monospace;font-weight:700">
        <span>[${i}]</span><span>${v}</span>${i===stkStack.length-1?'<span style="font-size:.6rem">← SP</span>':''}
      </div>`).join('')+'<div style="font-size:.65rem;color:#334155;margin-top:3px;text-align:center">Stack Base (0)</div>';
  }
  if(ptr)ptr.textContent=`SP = ${stkStack.length-1} | Size = ${stkStack.length}/${STK_MAX}`;
  if(info)info.innerHTML=`<b style="color:#38bdf8">${op} تمت:</b><br><code style="color:#94a3b8;font-size:.72rem">${desc}</code><br><br>
    <span style="color:#64748b;font-size:.72rem">💡 LIFO = Last In, First Out: آخر ما أُضيف هو أول ما يُأخذ. الاستخدام: استدعاء الدوال، تتبع عناوين الإرجاع</span>`;
  if(msg&&op!=='POP')msg.textContent='';
}
function stkReset(){stkStack=[];const v=document.getElementById('stk-visual');if(v)v.innerHTML='<div style="font-size:.68rem;color:#334155;text-align:center;margin-top:2rem">المكدس فارغ</div>';
  const p=document.getElementById('stk-ptr');if(p)p.textContent='SP = -1 (فارغ)';
  const i=document.getElementById('stk-info');if(i)i.innerHTML='اضغط PUSH لإضافة عنصر!';
  const m=document.getElementById('stk-msg');if(m)m.textContent='';}

const SC_CALLS=[
  {name:'open("/etc/passwd", O_RDONLY)',steps:['App تستدعي open()','CPU يُنفّذ TRAP/INT','ينتقل لـ Kernel Mode','OS يتحقق من الصلاحيات','يفتح الملف ويُعيد File Descriptor','يعود لـ User Mode'],correct:['App → open()','TRAP → Kernel','يتحقق الصلاحيات','يفتح الملف','يُعيد FD','User Mode']},
  {name:'fork() — إنشاء عملية ابن',steps:['App تستدعي fork()','TRAP يدخل Kernel Mode','OS ينسخ PCB الأب','يُنشئ عملية جديدة','يُعيد PID=0 للابن, PID>0 للأب','يضيف للـ Ready Queue'],correct:['fork() → TRAP','Kernel Mode','ينسخ PCB','عملية جديدة','PID للأب والابن','يضيف للـ Ready Queue']},
  {name:'write(fd, buffer, 1024)',steps:['App تستدعي write()','System Call Handler','يتحقق FD صالح','ينسخ من User Buffer → Kernel Buffer','يُجدول كتابة للـ I/O','يعود بعدد البايتات المكتوبة'],correct:['write() → Handler','System Call Handler','يتحقق FD','User Buffer → Kernel Buffer','يُجدول I/O','يُعيد عدد البايتات']},
];
let scIdx=0,scScore=0,scNext=0,scQueue=[],scCall=null;
function scStart(){
  scIdx=0;scScore=0;
  scQueue=[...SC_CALLS].sort(()=>Math.random()-.5);
  scShowCall();
}
function scShowCall(){
  if(scIdx>=scQueue.length){
    const s=document.getElementById('sc-call');if(s)s.innerHTML=`<b style="color:#fbbf24">🏆 نقاطك: ${scScore}</b>`;
    return;
  }
  scCall=scQueue[scIdx];scNext=0;
  const c=document.getElementById('sc-call');if(c)c.textContent=scCall.name;
  const sc_=document.getElementById('sc-score');if(sc_)sc_.textContent=`نقاط: ${scScore} | جولة: ${scIdx+1}/${scQueue.length}`;
  document.getElementById('sc-done').innerHTML='<span style="font-size:.68rem;color:#334155;align-self:center">الترتيب ←</span>';
  document.getElementById('sc-msg').textContent='انقر خطوات System Call بالترتيب الصحيح!';
  const shuffled=[...scCall.correct].sort(()=>Math.random()-.5);
  document.getElementById('sc-cards').innerHTML=shuffled.map((s,i)=>`
    <div onclick="scPick(${i},'${s.replace(/'/g,"\\'")}')"
      style="padding:.28rem .55rem;background:rgba(56,189,248,.1);border:1.5px solid rgba(56,189,248,.3);border-radius:6px;cursor:pointer;font-size:.73rem;color:#38bdf8;font-family:inherit;transition:.15s"
      onmouseenter="this.style.borderColor='#38bdf8'" onmouseleave="this.style.borderColor='rgba(56,189,248,.3)'">${s}</div>`).join('');
}
function scPick(i,val){
  const correct=scCall.correct[scNext];
  const cards=document.getElementById('sc-cards');
  const done=document.getElementById('sc-done');
  const msg=document.getElementById('sc-msg');
  const el=cards?.children[i];
  if(val===correct){
    scScore+=8;scNext++;
    if(done)done.innerHTML+=`<div style="padding:.2rem .45rem;background:rgba(56,189,248,.15);border:1px solid #38bdf8;border-radius:5px;font-size:.7rem;color:#38bdf8">${scNext}. ${val}</div>`;
    if(el)el.remove();
    if(msg)msg.innerHTML=`<span style="color:#34d399">✅ صح! +8</span>`;
    if(scNext===scCall.correct.length){scIdx++;setTimeout(scShowCall,1000);}
  } else {
    if(el){el.style.borderColor='#ef4444';el.style.background='rgba(239,68,68,.15)';setTimeout(()=>{el.style.borderColor='rgba(56,189,248,.3)';el.style.background='rgba(56,189,248,.1)';},700);}
    if(msg)msg.innerHTML=`<span style="color:#f87171">❌ الخطوة الصحيحة الآن: "${correct}"</span>`;
  }
  const sc_=document.getElementById('sc-score');if(sc_)sc_.textContent=`نقاط: ${scScore} | جولة: ${scIdx+1}/${scQueue.length}`;
}

const IRQ_STEPS_CORRECT=['جهاز يُرسل إشارة','PIC يستقبل الإشارة','يُرسل INTR للـ CPU','CPU يُنهي تعليمته','CPU يحفظ Context','CPU يُنفّذ ISR','CPU يعود للعملية'];
let irqGIdx=0,irqGScore=0,irqGNext=0,irqGShuffled=[];
function irqGameStart(){
  irqGIdx=0;irqGScore=0;
  const events=['⌨️ ضغطة مفتاح (Keyboard IRQ1)','💾 اكتملت قراءة القرص (Disk IRQ14)','📡 وصلت حزمة شبكة (Network IRQ9)'];
  irqGShow(events[Math.floor(Math.random()*3)]);
}
function irqGShow(event){
  irqGNext=0;
  irqGShuffled=[...IRQ_STEPS_CORRECT].sort(()=>Math.random()-.5);
  const ev=document.getElementById('irq-event');if(ev)ev.textContent='🚨 مقاطعة: '+event;
  document.getElementById('irq-done').innerHTML='<span style="font-size:.68rem;color:#334155;align-self:center">الترتيب ←</span>';
  document.getElementById('irq-gmsg').textContent='رتّب خطوات معالجة المقاطعة!';
  const sc=document.getElementById('irq-score');if(sc)sc.textContent=`نقاط: ${irqGScore} | جولة: ${irqGIdx+1}/5`;
  const cards=document.getElementById('irq-cards');
  if(cards)cards.innerHTML=irqGShuffled.map((s,i)=>`
    <div onclick="irqGPick(${i},'${s.replace(/'/g,"\\'")}')"
      style="padding:.28rem .55rem;background:rgba(248,113,113,.1);border:1.5px solid rgba(248,113,113,.3);border-radius:6px;cursor:pointer;font-size:.73rem;color:#f87171;font-family:inherit"
      onmouseenter="this.style.borderColor='#f87171'" onmouseleave="this.style.borderColor='rgba(248,113,113,.3)'">${s}</div>`).join('');
}
function irqGPick(i,val){
  const correct=IRQ_STEPS_CORRECT[irqGNext];
  const cards=document.getElementById('irq-cards');
  const done=document.getElementById('irq-done');
  const msg=document.getElementById('irq-gmsg');
  const el=cards?.children[i];
  if(val===correct){
    irqGScore+=5;irqGNext++;
    if(done)done.innerHTML+=`<div style="padding:.2rem .4rem;background:rgba(248,113,113,.15);border:1px solid #f87171;border-radius:5px;font-size:.7rem;color:#f87171">${irqGNext}. ${val}</div>`;
    if(el)el.remove();
    if(msg)msg.innerHTML='<span style="color:#34d399">✅ صح!</span>';
    if(irqGNext===IRQ_STEPS_CORRECT.length){
      irqGIdx++;
      const sc=document.getElementById('irq-score');if(sc)sc.textContent=`نقاط: ${irqGScore} | جولة: ${irqGIdx}/5`;
      if(irqGIdx>=5){const ev=document.getElementById('irq-event');if(ev)ev.innerHTML=`<b style="color:#fbbf24">🏆 أنجزت 5 مقاطعات! نقاطك: ${irqGScore}</b>`;}
      else{const ev2=document.getElementById('irq-event');if(ev2)setTimeout(()=>irqGameStart(),1000);}
    }
  } else {
    if(el){el.style.borderColor='#ef4444';el.style.background='rgba(239,68,68,.2)';setTimeout(()=>{el.style.borderColor='rgba(248,113,113,.3)';el.style.background='rgba(248,113,113,.1)';},600);}
    if(msg)msg.innerHTML=`<span style="color:#f87171">❌ الصحيح: "${correct}"</span>`;
    irqGScore=Math.max(0,irqGScore-2);
  }
}

// ═══════════════════════════════════════════════════════════
// GAME 13: Buffer Manager
// ═══════════════════════════════════════════════════════════
const BUF_MAX=8;
let bufData=[],bufScore=0,bufRead2=0,bufInterval2=null,bufTimer2=null,bufTime2=0,bufRunning=false;
function bufStart(){
  bufData=[];bufScore=0;bufRead2=0;bufTime2=0;bufRunning=true;
  if(bufInterval2)clearInterval(bufInterval2);
  if(bufTimer2)clearInterval(bufTimer2);
  bufInterval2=setInterval(()=>{
    if(!bufRunning)return;
    if(bufData.length>=BUF_MAX){
      bufRunning=false;clearInterval(bufInterval2);clearInterval(bufTimer2);
      const m=document.getElementById('buf-msg');
      if(m)m.innerHTML='<span style="color:#f87171">💥 Buffer Overflow! البيانات تكدست! — OS يجب أن يُدير Local Buffer بكفاءة</span>';
      return;
    }
    bufData.push({id:bufData.length,col:['#818cf8','#34d399','#fb923c','#38bdf8'][bufData.length%4]});
    bufScore++;bufRender();
  },900-Math.min(bufScore*15,600));
  bufTimer2=setInterval(()=>{
    bufTime2++;
    const t=document.getElementById('buf-status');
    if(t)t.textContent=`Buffer: ${bufData.length}/${BUF_MAX} | وقت: ${bufTime2}s`;
  },1000);
}
function bufRead(){
  if(!bufData.length){const m=document.getElementById('buf-msg');if(m)m.innerHTML='<span style="color:#818cf8">Buffer فارغ — لا بيانات للقراءة</span>';return;}
  bufData.shift();bufRead2++;
  const m=document.getElementById('buf-msg');
  if(m)m.innerHTML=`<span style="color:#34d399">✅ قرأ OS بيانات من Buffer | قراءات: ${bufRead2}</span>`;
  bufRender();
}
function bufStop(){bufRunning=false;if(bufInterval2)clearInterval(bufInterval2);if(bufTimer2)clearInterval(bufTimer2);}
function bufRender(){
  const cv=document.getElementById('bufCanvas');if(!cv)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,w,h);
  // Labels
  ctx.fillStyle='#94a3b8';ctx.font='8.5px system-ui';ctx.textAlign='left';
  ctx.fillText('📡 Input Stream',10,20);
  ctx.textAlign='right';ctx.fillText('💾 OS reads from Buffer',w-10,20);
  // Buffer box
  ctx.fillStyle='rgba(30,40,30,.5)';ctx.strokeStyle='#334155';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(10,30,w-20,60,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#475569';ctx.font='9px system-ui';ctx.textAlign='center';
  ctx.fillText(`Local Buffer (${BUF_MAX} slots)`,w/2,50);
  // Buffer slots
  const slotW=(w-40)/BUF_MAX;
  for(let i=0;i<BUF_MAX;i++){
    const d=bufData[i];

}

  const cv=document.getElementById('semCanvas');if(!cv)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;

  ];
  const semV=semVal;
  // Critical Section box
  ctx.fillStyle='rgba(248,113,113,.1)';ctx.strokeStyle='#f87171';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(240,30,140,120,10);ctx.fill();ctx.stroke();

  ctx.fillText(semV>0?'متاح — يمكن الدخول':'مغلق — انتظر!',500,96);
  // Processes
  procs.forEach((p,i)=>{
    const py=20+i*45;
    const isIn=p.state==='inside';
    const isWait=p.state==='waiting';
    ctx.fillStyle=isIn?p.col+'33':isWait?'rgba(251,191,36,.15)':'rgba(30,30,50,.5)';
    ctx.strokeStyle=isIn?p.col:isWait?'#fbbf24':'#334155';ctx.lineWidth=isIn?2:1;
    ctx.beginPath();ctx.roundRect(10,py,100,35,7);ctx.fill();ctx.stroke();

  });
  ctx.fillStyle='#64748b';ctx.font='8px system-ui';ctx.textAlign='center';
  ctx.fillText('P() = Wait (تقليل Semaphore) | V() = Signal (زيادة Semaphore)',w/2,h-8);
}
let semVal=1,semStates=['ready','ready','ready'];
function semOp(op,pid){
  const msg=document.getElementById('sem-msg');
  if(op==='P'){
    if(semVal>0){
      semVal--;semStates[pid]='inside';
      if(msg)msg.innerHTML=`<span style="color:#34d399">✅ P${pid+1} نفّذت P() — Semaphore=${semVal} — دخلت Critical Section</span>`;
    } else {
      semStates[pid]='waiting';
      if(msg)msg.innerHTML=`<span style="color:#f87171">⚠️ P${pid+1} نفّذت P() — Semaphore=${semVal} — BLOCKED! تنتظر</span>`;
    }
    const sv=document.getElementById('sem-val');if(sv)sv.textContent=semVal;
  } else {
    const inside=semStates.findIndex(s=>s==='inside');
    if(inside>=0){semStates[inside]='ready';semVal++;}
    else semVal=Math.min(semVal+1,1);
    const waiting=semStates.findIndex(s=>s==='waiting');
    if(waiting>=0&&semVal>0){semVal--;semStates[waiting]='inside';}
    if(msg)msg.innerHTML=`<span style="color:#38bdf8">✅ V() — Semaphore=${semVal} — Critical Section متاحة</span>`;
    const sv=document.getElementById('sem-val');if(sv)sv.textContent=semVal;
  }
  semDraw();
}
function semReset(){semVal=1;semStates=['ready','ready','ready'];
  const sv=document.getElementById('sem-val');if(sv)sv.textContent=1;
  const m=document.getElementById('sem-msg');if(m)m.textContent='';
  semDraw();
}

let raceAnim=null;
function raceRun(safe){
  if(raceAnim)clearInterval(raceAnim);
  const cv=document.getElementById('raceCanvas');
  if(!cv)return;
  const target=1000,steps=80;
  let stepI=0;
  const counters=[0,0]; // A progress, B progress
  let shared=0, lost=0;
  raceAnim=setInterval(()=>{
    stepI++;
    const progressA=Math.min(stepI/steps,1);
    const progressB=Math.min((stepI-5)/steps,1);
    if(!safe){
      // Simulate race: both read same value sometimes
      const readA=Math.floor(shared);
      const readB=Math.floor(shared);
      if(Math.random()<0.3){shared=readA+1;}
      else if(Math.random()<0.5){shared=readB+1;}
      else shared++;
    } else {
      // With mutex: sequential increments
      shared=Math.min(shared+13,target);
    }
    counters[0]=progressA*target;
    counters[1]=Math.max(0,progressB)*target;
    // Draw
    const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;

    // Process A
    ctx.fillStyle='rgba(129,140,248,.15)';ctx.strokeStyle='#818cf8';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(10,30,200,50,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#818cf8';ctx.font='bold 9px system-ui';ctx.textAlign='center';
    ctx.fillText('عملية A',110,52);
    ctx.fillStyle='#94a3b8';ctx.font='8px monospace';
    ctx.fillText('read → inc → write',110,68);
    // Process B
    ctx.fillStyle='rgba(52,211,153,.15)';ctx.strokeStyle='#34d399';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(220,30,200,50,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#34d399';ctx.font='bold 9px system-ui';ctx.textAlign='center';
    ctx.fillText('عملية B',320,52);
    ctx.fillStyle='#94a3b8';ctx.font='8px monospace';
    ctx.fillText('read → inc → write',320,68);
    // Mutex lock visual
    if(safe){
      ctx.fillStyle='rgba(52,211,153,.2)';ctx.strokeStyle='#34d399';ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(430,30,130,50,7);ctx.fill();ctx.stroke();
      ctx.fillStyle='#34d399';ctx.font='bold 9px system-ui';ctx.textAlign='center';
      ctx.fillText('🔒 Mutex',495,52);
      ctx.fillStyle='#94a3b8';ctx.font='7.5px system-ui';
      ctx.fillText('يمنع التزامن',495,66);
    }
    // Shared counter
    ctx.fillStyle=safe?'rgba(52,211,153,.15)':'rgba(248,113,113,.15)';
    ctx.strokeStyle=safe?'#34d399':'#f87171';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(150,95,280,55,10);ctx.fill();ctx.stroke();
    ctx.fillStyle=safe?'#34d399':'#f87171';ctx.font='bold 10px system-ui';ctx.textAlign='center';
    ctx.fillText('Counter المشترك',290,115);
    ctx.fillStyle='#e2e8f0';ctx.font='bold 16px monospace';
    ctx.fillText(Math.round(shared),290,138);
    // Expected
    ctx.fillStyle='#64748b';ctx.font='7.5px system-ui';
    ctx.fillText('القيمة المتوقعة: '+target,w-80,h-5);
    if(stepI>=steps+10){
      clearInterval(raceAnim);raceAnim=null;
      const r=document.getElementById('race-result');
      if(r){
        const actual=Math.round(shared);
        if(safe)r.innerHTML=`<span style="color:#34d399">✅ صحيح! Counter = ${actual} = ${target} — Mutex حمى البيانات</span>`;
        else r.innerHTML=`<span style="color:#f87171">❌ خطأ! Counter = ${actual} بدلاً من ${target} — ضُيّع ${target-actual} عملية تحديث!</span>`;
      }
    }
  },40);
}

// ══════════════════════════════════════════════════════
// MODULE 9: CPU Scheduling Simulator
// ══════════════════════════════════════════════════════
let schProcs=[],schAlgo='FCFS',schColors=['#818cf8','#34d399','#fb923c','#f87171','#fbbf24','#38bdf8'],schNextId=0;
function schAdd(){
  const name=document.getElementById('sch-name')?.value||'P'+(schNextId+1);
  const arr=parseInt(document.getElementById('sch-arr')?.value||'0');
  const burst=parseInt(document.getElementById('sch-burst')?.value||'5');
  const prio=parseInt(document.getElementById('sch-prio')?.value||'1');
  schProcs.push({id:schNextId,name,arr,burst,prio,col:schColors[schNextId%schColors.length]});
  schNextId++;
  const ni=document.getElementById('sch-name');if(ni)ni.value='P'+(schNextId+1);
  schRenderProcs();
}
function schRenderProcs(){
  const el=document.getElementById('sch-procs');
  if(!el)return;
  el.innerHTML=schProcs.map((p,i)=>`
    <span style="background:${p.col}22;border:1px solid ${p.col};color:${p.col};border-radius:5px;padding:.15rem .4rem;font-size:.7rem;font-weight:700;cursor:pointer"
      onclick="schRemove(${i})" title="انقر للحذف">
      ${p.name} [وصول:${p.arr} تنفيذ:${p.burst} أولوية:${p.prio}] ✕
    </span>`).join('');
}
function schRemove(i){schProcs.splice(i,1);schRenderProcs();}
function schSetAlgo(a){
  schAlgo=a;
  ['fcfs','sjf','pri','rr'].forEach(x=>{const b=document.getElementById('sch-'+x);if(b)b.style.borderWidth='1px';});
  const map={FCFS:'fcfs',SJF:'sjf',Priority:'pri',RR:'rr'};
  const b=document.getElementById('sch-'+map[a]);if(b)b.style.borderWidth='2px';
  const explanations={
    FCFS:'<b style="color:#818cf8">FCFS — First Come First Served:</b> من يأتي أولاً يُنفَّذ أولاً. بسيط لكن يعاني من Convoy Effect.',
    SJF:'<b style="color:#34d399">SJF — Shortest Job First:</b> الأقصر أولاً = أقل متوسط انتظار. لكن Starvation للعمليات الطويلة.',
    Priority:'<b style="color:#fb923c">Priority Scheduling:</b> الأعلى أولوية أولاً (1=عالي). مشكلة Starvation للأولويات المنخفضة.',
    RR:'<b style="color:#fbbf24">Round Robin:</b> كل عملية تأخذ Quantum ثم تُعاد للقائمة. الأعدل! مناسب لـ Time-Sharing.'
  };
  const ex=document.getElementById('sch-explain');if(ex)ex.innerHTML=explanations[a]||'';
}
function schRun(){
  if(!schProcs.length){
    const ex=document.getElementById('sch-explain');
    if(ex)ex.innerHTML='<span style="color:#f87171">أضف عمليات أولاً!</span>';
    return;
  }
  const q=parseInt(document.getElementById('sch-q')?.value||'3');
  let gantt=[];
  const procs=schProcs.map(p=>({...p,rem:p.burst,finish:0,wait:0,turnaround:0}));
  let t=0;
  if(schAlgo==='FCFS'){
    const sorted=[...procs].sort((a,b)=>a.arr-b.arr||a.id-b.id);
    sorted.forEach(p=>{t=Math.max(t,p.arr);gantt.push({name:p.name,col:p.col,start:t,dur:p.burst});t+=p.burst;p.finish=t;p.turnaround=t-p.arr;p.wait=p.turnaround-p.burst;});
  } else if(schAlgo==='SJF'){
    const rem=[...procs];let done=0;
    while(done<procs.length){
      const avail=rem.filter(p=>p.rem>0&&p.arr<=t);
      if(!avail.length){t++;continue;}
      const p=avail.sort((a,b)=>a.rem-b.rem)[0];
      gantt.push({name:p.name,col:p.col,start:t,dur:p.rem});
      t+=p.rem;p.finish=t;p.turnaround=t-p.arr;p.wait=p.turnaround-p.burst;p.rem=0;done++;
    }
  } else if(schAlgo==='Priority'){
    const rem=[...procs];let done=0;
    while(done<procs.length){
      const avail=rem.filter(p=>p.rem>0&&p.arr<=t);
      if(!avail.length){t++;continue;}
      const p=avail.sort((a,b)=>a.prio-b.prio)[0];
      gantt.push({name:p.name,col:p.col,start:t,dur:p.rem});
      t+=p.rem;p.finish=t;p.turnaround=t-p.arr;p.wait=p.turnaround-p.burst;p.rem=0;done++;
    }
  } else if(schAlgo==='RR'){
    const rem=[...procs].map(p=>({...p,rem:p.burst}));
    const queue=[];let done=0;let nextArr=0;
    const addArrivals=(time)=>{rem.filter(p=>p.arr<=time&&p.rem>0&&!queue.find(q=>q.id===p.id)).forEach(p=>{if(!queue.find(q=>q.id===p.id))queue.push(p);});};
    addArrivals(0);
    while(done<procs.length){
      if(!queue.length){t++;addArrivals(t);continue;}
      const p=queue.shift();const run=Math.min(p.rem,q);
      gantt.push({name:p.name,col:p.col,start:t,dur:run});t+=run;p.rem-=run;
      addArrivals(t);
      if(p.rem>0)queue.push(p);
      else{p.finish=t;const orig=procs.find(x=>x.id===p.id);if(orig){orig.finish=t;orig.turnaround=t-orig.arr;orig.wait=orig.turnaround-orig.burst;}done++;}
    }
  }
  // Draw Gantt
  const cv=document.getElementById('schCanvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,w,h);
  const totalTime=gantt.reduce((s,g)=>s+g.dur,0)||1;
  const scale=(w-20)/totalTime;
  ctx.fillStyle='#94a3b8';ctx.font='9px system-ui';ctx.textAlign='center';
  ctx.fillText(`Gantt Chart — ${schAlgo}${schAlgo==='RR'?' (Q='+q+')':''}`,w/2,15);
  // Bars
  let gx=10;
  gantt.forEach(g=>{
    const bw=g.dur*scale;
    ctx.fillStyle=g.col+'55';ctx.strokeStyle=g.col;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(gx,25,bw-1,40,4);ctx.fill();ctx.stroke();
    if(bw>20){ctx.fillStyle=g.col;ctx.font=`bold ${bw>30?9:7}px system-ui`;ctx.textAlign='center';ctx.fillText(g.name,gx+bw/2,49);}
    // Time labels
    ctx.fillStyle='#64748b';ctx.font='7px system-ui';ctx.textAlign='center';ctx.fillText(g.start,gx,70);
    gx+=bw;
  });
  ctx.fillStyle='#64748b';ctx.font='7px system-ui';ctx.textAlign='center';ctx.fillText(totalTime,gx,70);
  // Per-process stats
  let infoY=85;
  procs.forEach(p=>{
    if(!p.finish)return;
    ctx.fillStyle=p.col;ctx.font='8px system-ui';ctx.textAlign='left';
    ctx.fillText(`${p.name}: انتهى=${p.finish}  انتظار=${p.wait}  Turnaround=${p.turnaround}`,12,infoY);
    infoY+=14;
  });
  // Averages
  const validProcs=procs.filter(p=>p.finish);
  if(validProcs.length){
    const avgW=(validProcs.reduce((s,p)=>s+p.wait,0)/validProcs.length).toFixed(1);
    const avgT=(validProcs.reduce((s,p)=>s+p.turnaround,0)/validProcs.length).toFixed(1);
    const statsEl=document.getElementById('sch-stats');
