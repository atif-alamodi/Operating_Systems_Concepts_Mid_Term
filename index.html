function dlSimulate(withDeadlock){
  const cv=document.getElementById('dlCanvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,w,h);
  const procs=[{name:'P1',col:'#818cf8'},{name:'P2',col:'#34d399'},{name:'P3',col:'#fb923c'}];
  const res=[{name:'R1'},{name:'R2'},{name:'R3'}];
  // positions
  const px=[80,290,500],py=[h/2,h/2,h/2];
  const rx=[150,290,430],ry=[60,60,60];
  // Draw resources (top)
  res.forEach((r,i)=>{
    ctx.fillStyle='rgba(251,191,36,.15)';ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(rx[i]-30,ry[i]-18,60,36,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fbbf24';ctx.font='bold 9px system-ui';ctx.textAlign='center';
    ctx.fillText(r.name,rx[i],ry[i]+5);
  });
  // Draw processes (middle)
  procs.forEach((p,i)=>{
    ctx.fillStyle=p.col+'22';ctx.strokeStyle=p.col;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px[i],py[i],32,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle=p.col;ctx.font='bold 10px system-ui';ctx.textAlign='center';
    ctx.fillText(p.name,px[i],py[i]+4);
  });
  // Draw edges
  const drawArrow=(x1,y1,x2,y2,col,label)=>{
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    const angle=Math.atan2(y2-y1,x2-x1);
    ctx.fillStyle=col;ctx.beginPath();
    ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(angle-0.4),y2-10*Math.sin(angle-0.4));
    ctx.lineTo(x2-10*Math.cos(angle+0.4),y2-10*Math.sin(angle+0.4));ctx.closePath();ctx.fill();
    if(label){const mx=(x1+x2)/2,my=(y1+y2)/2;ctx.fillStyle=col;ctx.font='7px system-ui';ctx.textAlign='center';ctx.fillText(label,mx+8,my-5);}
  };
  if(withDeadlock){
    // P1 holds R1, waits R2
    // P2 holds R2, waits R3
    // P3 holds R3, waits R1 (circular!)
    drawArrow(rx[0],ry[0]+18,px[0],py[0]-32,'#34d399','يمسك R1');
    drawArrow(px[0],py[0]-32,rx[1]-30,ry[1]+18,'#f87171','ينتظر R2');
    drawArrow(rx[1],ry[1]+18,px[1],py[1]-32,'#34d399','يمسك R2');
    drawArrow(px[1],py[1]-32,rx[2]+30,ry[2]+18,'#f87171','ينتظر R3');
    drawArrow(rx[2],ry[2]+18,px[2],py[2]-32,'#34d399','يمسك R3');
    drawArrow(px[2],py[2]-32,rx[0]-30,ry[0]+18,'#f87171','ينتظر R1');
    // Deadlock label
    ctx.fillStyle='rgba(248,113,113,.2)';ctx.strokeStyle='#f87171';ctx.lineWidth=2;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.ellipse(w/2,h/2-20,200,80,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#f87171';ctx.font='bold 12px system-ui';ctx.textAlign='center';
    ctx.fillText('💀 DEADLOCK!',w/2,h-15);
    const info=document.getElementById('dl-info');
    if(info)info.innerHTML='<b style="color:#f87171">💀 حدث الجمود!</b> P1→ينتظر R2 (عند P2) → P2 ينتظر R3 (عند P3) → P3 ينتظر R1 (عند P1) = <b>حلقة مغلقة!</b>';
  } else {
    // P1 holds R1 uses R2
    // P2 holds R2 finished
    // P3 waits no circular
    drawArrow(rx[0],ry[0]+18,px[0],py[0]-32,'#34d399','يمسك R1');
    drawArrow(rx[1],ry[1]+18,px[1],py[1]-32,'#34d399','يمسك R2');
    drawArrow(px[2],py[2]-32,rx[2]-30,ry[2]+18,'#818cf8','ينتظر R3');
    ctx.fillStyle='#34d399';ctx.font='bold 11px system-ui';ctx.textAlign='center';
    ctx.fillText('✅ لا جمود — لا توجد حلقة دائرية',w/2,h-15);
    const info=document.getElementById('dl-info');
    if(info)info.innerHTML='<b style="color:#34d399">✅ لا جمود!</b> P3 تنتظر R3 لكن لا توجد حلقة مغلقة — R3 ستُحرَّر عندما تنتهي عملية تمسكها.';
  }
}
function dlReset(){
  const cv=document.getElementById('dlCanvas');
  if(cv){const ctx=cv.getContext('2d');ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,cv.width,cv.height);}
  const info=document.getElementById('dl-info');if(info)info.textContent='';
}

// Banker's Algorithm
// ══════════════════════════════════════════════════════
let bankerData={
  processes:['P0','P1','P2','P3','P4'],
  allocated:[[0,1,0],[2,0,0],[3,0,2],[2,1,1],[0,0,2]],
  maximum:[[7,5,3],[3,2,2],[9,0,2],[2,2,2],[4,3,3]],
  available:[3,3,2]
};
let bankerIdx=0;
const BANKER_EXAMPLES=[
  {processes:['P0','P1','P2','P3','P4'],allocated:[[0,1,0],[2,0,0],[3,0,2],[2,1,1],[0,0,2]],maximum:[[7,5,3],[3,2,2],[9,0,2],[2,2,2],[4,3,3]],available:[3,3,2]},
  {processes:['P0','P1','P2'],allocated:[[1,0,0],[0,1,0],[0,0,1]],maximum:[[2,1,1],[1,2,0],[1,1,3]],available:[1,1,1]},
  {processes:['P0','P1','P2'],allocated:[[2,1,1],[1,1,0],[1,0,1]],maximum:[[3,2,2],[2,2,1],[2,1,2]],available:[0,0,0]},
];
function bankerReset(){
  bankerIdx=(bankerIdx+1)%BANKER_EXAMPLES.length;
  bankerData={...BANKER_EXAMPLES[bankerIdx]};
  document.getElementById('banker-result').textContent='';
  const cv=document.getElementById('bankerCanvas');
  if(cv){const ctx=cv.getContext('2d');ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,cv.width,cv.height);}
  bankerRenderTable();
}
function bankerRenderTable(){
  const el=document.getElementById('banker-table');
  if(!el)return;
  const n=bankerData.processes.length,m=bankerData.available.length;
  const need=bankerData.processes.map((_,i)=>bankerData.maximum[i].map((v,j)=>v-bankerData.allocated[i][j]));
  el.innerHTML=`
    <table style="width:100%;font-size:.72rem;border-collapse:collapse">
      <tr style="background:rgba(129,140,248,.1)">
        <th style="border:1px solid #1f2937;padding:.3rem;color:#818cf8">العملية</th>
        ${['A','B','C'].slice(0,m).map(r=>`<th style="border:1px solid #1f2937;padding:.3rem;color:#fb923c">Alloc ${r}</th>`).join('')}
        ${['A','B','C'].slice(0,m).map(r=>`<th style="border:1px solid #1f2937;padding:.3rem;color:#fbbf24">Max ${r}</th>`).join('')}
        ${['A','B','C'].slice(0,m).map(r=>`<th style="border:1px solid #1f2937;padding:.3rem;color:#f87171">Need ${r}</th>`).join('')}
      </tr>
      ${bankerData.processes.map((p,i)=>`
        <tr>
          <td style="border:1px solid #1f2937;padding:.25rem;color:#818cf8;font-weight:700">${p}</td>
          ${bankerData.allocated[i].map(v=>`<td style="border:1px solid #1f2937;padding:.25rem;text-align:center;color:#fb923c">${v}</td>`).join('')}
          ${bankerData.maximum[i].map(v=>`<td style="border:1px solid #1f2937;padding:.25rem;text-align:center;color:#fbbf24">${v}</td>`).join('')}
          ${need[i].map(v=>`<td style="border:1px solid #1f2937;padding:.25rem;text-align:center;color:#f87171">${v}</td>`).join('')}
        </tr>`).join('')}
      <tr style="background:rgba(52,211,153,.08)">
        <td style="border:1px solid #1f2937;padding:.25rem;color:#34d399;font-weight:700">Available</td>
        ${bankerData.available.map(v=>`<td colspan="3" style="border:1px solid #1f2937;padding:.25rem;text-align:center;color:#34d399;font-weight:700">${v}</td>`).join('')}
      </tr>
    </table>`;
}
function bankerCheck(){
  const n=bankerData.processes.length,m=bankerData.available.length;
  const need=bankerData.processes.map((_,i)=>bankerData.maximum[i].map((v,j)=>v-bankerData.allocated[i][j]));
  const work=[...bankerData.available];
  const finish=new Array(n).fill(false);
  const seq=[];
  for(let iter=0;iter<n*n;iter++){
    for(let i=0;i<n;i++){
      if(!finish[i]&&need[i].every((v,j)=>v<=work[j])){
        work.forEach((_,j)=>{work[j]+=bankerData.allocated[i][j];});
        finish[i]=true;seq.push(i);break;
      }
    }
  }
  const safe=finish.every(Boolean);
  // Draw result on canvas
  const cv=document.getElementById('bankerCanvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,w,h);
  ctx.fillStyle=safe?'#34d399':'#f87171';ctx.font='bold 11px system-ui';ctx.textAlign='center';
  ctx.fillText(safe?'✅ Safe State — يوجد Safe Sequence':'❌ Unsafe State — لا يوجد Safe Sequence',w/2,25);
  if(safe&&seq.length){
    const seqNames=seq.map(i=>bankerData.processes[i]);
    ctx.fillStyle='#e2e8f0';ctx.font='10px system-ui';ctx.textAlign='center';
    ctx.fillText('Safe Sequence: '+seqNames.join(' → '),w/2,50);
    // Draw sequence steps
    const stepW=(w-30)/(seqNames.length);
    seqNames.forEach((p,i)=>{
      const cols=['#818cf8','#34d399','#fb923c','#f87171','#fbbf24'];
      ctx.fillStyle=cols[i%cols.length]+'33';ctx.strokeStyle=cols[i%cols.length];ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(15+i*stepW,62,stepW-4,45,6);ctx.fill();ctx.stroke();
      ctx.fillStyle=cols[i%cols.length];ctx.font='bold 9px system-ui';ctx.textAlign='center';
      ctx.fillText(p,15+i*stepW+stepW/2,80);
      ctx.fillStyle='#94a3b8';ctx.font='7px system-ui';
      ctx.fillText('تُنجز',15+i*stepW+stepW/2,93);
      if(i<seqNames.length-1){ctx.fillStyle='#475569';ctx.font='12px system-ui';ctx.fillText('→',15+(i+1)*stepW-3,85);}
    });
  }
  const result=document.getElementById('banker-result');
  if(result){
    if(safe)result.innerHTML=`<span style="color:#34d399">✅ حالة آمنة! الـ Safe Sequence: ${seq.map(i=>bankerData.processes[i]).join(' → ')} — يمكن إنهاء جميع العمليات</span>`;
    else result.innerHTML='<span style="color:#f87171">❌ حالة غير آمنة — خطر الجمود! لا يوجد ترتيب يُنهي جميع العمليات بالموارد المتاحة</span>';
  }
}

// Interrupt Timeline Simulator
// ══════════════════════════════════════════════════════
let tlAnim=null,tlStep=0;
const TL_STEPS=[
  {t:0,label:'CPU يُنفّذ البرنامج الأصلي',cpu:'running',io:'idle'},
  {t:40,label:'البرنامج يطلب عملية I/O (قراءة من قرص)',cpu:'running',io:'idle'},
  {t:80,label:'I/O device يبدأ النقل (CPU يكمل عمله)',cpu:'running',io:'transferring'},
  {t:160,label:'I/O اكتمل! يُرسل Interrupt للـ CPU',cpu:'running',io:'interrupt'},
  {t:200,label:'CPU ينتهي من تعليمته الحالية',cpu:'finishing',io:'idle'},
  {t:240,label:'CPU يحفظ Context ويعالج ISR',cpu:'isr',io:'idle'},
  {t:300,label:'ISR تنتهي — CPU يعود للبرنامج الأصلي',cpu:'running',io:'idle'},
];
function timelineStart(){
  tlStep=0;
  if(tlAnim)clearInterval(tlAnim);
  const cv=document.getElementById('timelineCanvas');
  if(!cv)return;
  tlAnim=setInterval(()=>{
    if(!document.getElementById('timelineCanvas')){clearInterval(tlAnim);return;}
    tlDrawStep(cv,tlStep);
    const info=document.getElementById('timeline-info');
    if(info&&TL_STEPS[tlStep])info.textContent=`الخطوة ${tlStep+1}: ${TL_STEPS[tlStep].label}`;
    tlStep++;
    if(tlStep>=TL_STEPS.length){clearInterval(tlAnim);}
  },900);
}
function tlDrawStep(cv,step){
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,w,h);
  if(step>=TL_STEPS.length)step=TL_STEPS.length-1;
  const now=TL_STEPS[step];
  // Time axis
  const txY=h-25;
  ctx.strokeStyle='#334155';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(20,txY);ctx.lineTo(w-20,txY);ctx.stroke();
  // CPU row
  ctx.fillStyle='#fbbf24';ctx.font='bold 9px system-ui';ctx.textAlign='right';
  ctx.fillText('CPU:',55,50);
  ctx.fillText('I/O Device:',55,100);
  // Draw timeline bars
  const totalW=w-80;
  const phases=[
    {start:0,end:0.15,type:'run',row:'cpu',label:''},
    {start:0.15,end:0.35,type:'run',row:'cpu',label:''},
    {start:0.35,end:0.6,type:'run',row:'cpu',label:''},
    {start:0.6,end:0.7,type:'wait',row:'cpu',label:'finish'},
    {start:0.7,end:0.85,type:'isr',row:'cpu',label:'ISR'},
    {start:0.85,end:1.0,type:'run',row:'cpu',label:''},
    // I/O
    {start:0.15,end:0.55,type:'transfer',row:'io',label:'Transferring'},
    {start:0.55,end:0.65,type:'interrupt',row:'io',label:'⚡ IRQ'},
  ];
  const rowY={cpu:30,io:80};
  const colors={run:'#34d399',wait:'#fbbf24',isr:'#f87171',transfer:'#818cf8',interrupt:'#fb923c'};
  phases.forEach(ph=>{
    const p=Math.min(step/TL_STEPS.length,1);
    const visEnd=Math.min(ph.end,p);
    if(visEnd<=ph.start)return;
    const x=60+ph.start*totalW,bw=(visEnd-ph.start)*totalW;
    const y=rowY[ph.row];
    ctx.fillStyle=colors[ph.type]+'55';ctx.strokeStyle=colors[ph.type];ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(x,y,bw,30,4);ctx.fill();ctx.stroke();
    if(bw>35&&ph.label){ctx.fillStyle=colors[ph.type];ctx.font='7.5px system-ui';ctx.textAlign='center';ctx.fillText(ph.label,x+bw/2,y+18);}
  });
  // Time markers
  [0,0.15,0.35,0.55,0.65,0.85,1.0].forEach(t=>{
    const x=60+t*totalW;
    ctx.strokeStyle='#475569';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,txY-5);ctx.lineTo(x,txY+5);ctx.stroke();
  });
  ctx.fillStyle='#64748b';ctx.font='8px system-ui';ctx.textAlign='center';
  ctx.fillText('I/O Request',60+0.15*totalW,txY+16);
  ctx.fillText('IRQ',60+0.55*totalW,txY+16);
  ctx.fillText('ISR',60+0.65*totalW,txY+16);
  ctx.fillText('Resume',60+0.85*totalW,txY+16);
  // Legend
  ctx.fillStyle='#34d399';ctx.font='8px system-ui';ctx.textAlign='left';
  ctx.fillText('■ Running',65,h-7);
  ctx.fillStyle='#f87171';ctx.fillText('■ ISR',145,h-7);
  ctx.fillStyle='#818cf8';ctx.fillText('■ I/O Transfer',195,h-7);
  ctx.fillStyle='#fb923c';ctx.fillText('■ Interrupt',305,h-7);
}
function timelineReset(){
  tlStep=0;if(tlAnim)clearInterval(tlAnim);
  const cv=document.getElementById('timelineCanvas');
  if(cv){const ctx=cv.getContext('2d');ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,cv.width,cv.height);}
  const i=document.getElementById('timeline-info');if(i)i.textContent='';
}

// ══════════════════════════════════════════════════════
// Context Switch Overhead Visualizer
// ══════════════════════════════════════════════════════
function ctxUpdate(){
  const np=parseInt(document.getElementById('ctx-procs')?.value||3);
  const oh=parseInt(document.getElementById('ctx-overhead')?.value||15);
  const nvEl=document.getElementById('ctx-proc-val');if(nvEl)nvEl.textContent=np;
  const ohEl=document.getElementById('ctx-oh-val');if(ohEl)ohEl.textContent=oh+'%';
  const cv=document.getElementById('ctxCanvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
  ctx.fillStyle='#0a0f1e';ctx.fillRect(0,0,w,h);

  const cols=['#818cf8','#34d399','#fb923c','#f87171','#fbbf24','#38bdf8','#a78bfa','#e879f9'];
  const rowH=28,startY=18,barX=80,barW=w-90;
  const switchW=Math.round(barW*oh/100/Math.max(np-1,1));
  const workW=Math.round((barW-switchW*Math.max(np-1,1))/np);

  // Draw each process row
  let curX=barX;
  for(let i=0;i<np;i++){
    const col=cols[i%cols.length];
    const y=startY+i*rowH;
    // Label
    ctx.fillStyle=col;ctx.font='8px system-ui';ctx.textAlign='right';
    ctx.fillText(`P${i+1}`,76,y+rowH/2+3);
    // Work period
    ctx.fillStyle=col+'44';ctx.strokeStyle=col;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(curX,y,workW,rowH-4,4);ctx.fill();ctx.stroke();
    ctx.fillStyle=col;ctx.font='bold 8px system-ui';ctx.textAlign='center';
    if(workW>25)ctx.fillText('عمل مفيد',curX+workW/2,y+rowH/2+3);
    // Context switch overhead
    if(i<np-1){
      ctx.fillStyle='rgba(248,113,113,.3)';ctx.strokeStyle='#f87171';ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(curX+workW,y,switchW,rowH-4,3);ctx.fill();ctx.stroke();
      ctx.fillStyle='#f87171';ctx.font='7px system-ui';ctx.textAlign='center';
      if(switchW>20)ctx.fillText('CS!',curX+workW+switchW/2,y+rowH/2+3);
      curX+=workW+switchW;
    }
  }
  // Timeline
  const tlY=startY+np*rowH+5;
  ctx.strokeStyle='#334155';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(barX,tlY);ctx.lineTo(w-10,tlY);ctx.stroke();

  // Stats
  const totalWork=workW*np;
  const totalSwitch=switchW*(np-1);
  const efficiency=Math.round(totalWork/(totalWork+totalSwitch)*100);
  const infoEl=document.getElementById('ctx-info');
  if(infoEl){
    infoEl.innerHTML=`<span style="color:#34d399">وقت العمل الفعلي: ${efficiency}%</span> &nbsp;|&nbsp; <span style="color:#f87171">Overhead التبديل: ${100-efficiency}%</span> &nbsp;|&nbsp; <span style="color:#94a3b8">${np} عملية × تبديل ${oh}%</span>`;
  }
}

  mkdir:(a)=>{if(!a)return 'mkdir: اكتب اسم المجلد';if(!cliFS[cliCwd])cliFS[cliCwd]=[];cliFS[cliCwd].push(a+'/');return `تم إنشاء المجلد: ${a}`;},

};
function cliExec(){
  const inp=document.getElementById('cli-inp');
  const out=document.getElementById('cli-out');
  const raw=inp.value.trim();
  if(!raw)return;
  const [cmd,...args]=raw.split(/\s+/);
  const arg=args.join(' ');
  let result;
  if(cliCmds[cmd])result=cliCmds[cmd](arg);
  else result=`bash: ${cmd}: أمر غير معروف — جرّب 'help'`;
  if(result!==null){
    out.textContent+=(out.textContent?'\n':'')+'$ '+raw+'\n'+(result||'');

  }
  inp.value='';
}

  Running:{x:340,y:125,color:'#fbbf24',label:'تعمل',desc:'المعالج يُنفّذها الآن. حالة واحدة فقط يمكنها التنفيذ.'},
  Waiting:{x:200,y:195,color:'#fb923c',label:'منتظرة',desc:'توقفت لانتظار عملية I/O أو حدث خارجي.'},
  Terminated:{x:470,y:125,color:'#f87171',label:'منتهية',desc:'انتهى تنفيذها. OS يحرر مواردها من الذاكرة.'}
};
const TRANS={
  New:{admit:'Ready'},Ready:{dispatch:'Running'},Running:{block:'Waiting',exit:'Terminated',preempt:'Ready'},
  Waiting:{resume:'Ready'},Terminated:{}
};
const TRANS_LABELS={admit:'Admit',dispatch:'Dispatch',block:'I/O Wait',exit:'Exit',preempt:'Preempt',resume:'I/O Done'};
let pCur='New';
function initStateCanvas(){
  const cv=document.getElementById('stateCanvas');
  if(!cv)return;
  drawStates(cv);
}
function drawStates(cv){
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  // Draw arrows between states
  const arrows=[
    ['New','Ready','Admit','#34d399'],['Ready','Running','Dispatch','#818cf8'],
    ['Running','Waiting','I/O Wait','#fb923c'],['Waiting','Ready','I/O Done','#818cf8'],
    ['Running','Terminated','Exit','#f87171'],['Running','Ready','Preempt','#fbbf24']
  ];
  arrows.forEach(([from,to,lbl,col])=>{
    const s=STATES[from],t=STATES[to];
    ctx.strokeStyle=col;ctx.lineWidth=1.5;
    ctx.beginPath();
    // offset arrows to avoid overlap
    const dx=t.x-s.x,dy=t.y-s.y;
    const len=Math.sqrt(dx*dx+dy*dy);
    const nx=dx/len,ny=dy/len;
    const ox=-ny*8,oy=nx*8;
    const sx=s.x+nx*35+ox,sy=s.y+ny*35+oy;
    const ex=t.x-nx*35+ox,ey=t.y-ny*35+oy;
    ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
    ctx.stroke();
    // arrowhead
    const angle=Math.atan2(ey-sy,ex-sx);
    ctx.fillStyle=col;ctx.beginPath();
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex-12*Math.cos(angle-0.4),ey-12*Math.sin(angle-0.4));
    ctx.lineTo(ex-12*Math.cos(angle+0.4),ey-12*Math.sin(angle+0.4));
    ctx.closePath();ctx.fill();
    // label
    const mx=(sx+ex)/2+ox*0.5,my=(sy+ey)/2+oy*0.5;
    ctx.fillStyle=col;ctx.font='9px system-ui';ctx.textAlign='center';
    ctx.fillText(lbl,mx,my);
  });
  // Draw state circles
  Object.entries(STATES).forEach(([name,s])=>{
    const isActive=name===pCur;
    ctx.beginPath();ctx.arc(s.x,s.y,30,0,Math.PI*2);
    ctx.fillStyle=isActive?s.color+'33':'rgba(30,30,50,.7)';
    ctx.fill();
    ctx.strokeStyle=s.color;ctx.lineWidth=isActive?3:1.5;
    ctx.stroke();
    if(isActive){
      ctx.beginPath();ctx.arc(s.x,s.y,35,0,Math.PI*2);
      ctx.strokeStyle=s.color+'55';ctx.lineWidth=2;ctx.setLineDash([4,3]);
      ctx.stroke();ctx.setLineDash([]);
    }
    ctx.fillStyle='#e2e8f0';ctx.font='bold 9px system-ui';ctx.textAlign='center';
    ctx.fillText(s.label,s.x,s.y+3);
    ctx.fillStyle=s.color;ctx.font='8px system-ui';
    ctx.fillText(name,s.x,s.y+16);
  });
}
function procTrans(action){
  if(action==='reset'){pCur='New';}
  else if(TRANS[pCur]&&TRANS[pCur][action]){pCur=TRANS[pCur][action];}
  const cv=document.getElementById('stateCanvas');
  if(cv)drawStates(cv);
  const st=STATES[pCur];
  const dn=document.getElementById('stateName');
  const dd=document.getElementById('stateDesc');
  if(dn)dn.textContent=st.label+' ('+pCur+')';
  if(dn)dn.style.color=st.color;
  if(dd)dd.textContent=st.desc;
}

// ── Parent-Child Tree ──
let pcNodes=[{id:1,pid:null,name:'init',state:'running',x:290,y:30}];
let pcNextPid=1000;
function drawPCTree(){
  const cv=document.getElementById('treeCanvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  // Layout: group by parent
  const layout=layoutTree(pcNodes);
  // Draw edges
  layout.forEach(n=>{
    if(n.pid!==null){
      const parent=layout.find(p=>p.id===n.pid);
      if(parent){
        ctx.strokeStyle=n.state==='zombie'?'#f87171':n.state==='orphan'?'#fb923c':'#475569';
        ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
        ctx.beginPath();ctx.moveTo(parent.dx,parent.dy+22);ctx.lineTo(n.dx,n.dy-22);ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  });
  // Draw nodes
  layout.forEach(n=>{
    const colors={running:'#34d399',zombie:'#f87171',orphan:'#fb923c',dead:'#475569'};
    const col=colors[n.state]||'#818cf8';
    ctx.beginPath();ctx.roundRect(n.dx-45,n.dy-20,90,40,8);
    ctx.fillStyle='rgba(17,24,39,.9)';ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=col;ctx.font='bold 9px system-ui';ctx.textAlign='center';
    ctx.fillText(`PID: ${n.id}`,n.dx,n.dy-5);
    ctx.fillStyle='#e2e8f0';ctx.font='8px system-ui';
    ctx.fillText(n.name,n.dx,n.dy+8);
    ctx.fillStyle=col;ctx.font='7px system-ui';
    ctx.fillText('['+n.state+']',n.dx,n.dy+20);
  });
}
function layoutTree(nodes){
  const result=[];
  const levels={};
  nodes.forEach(n=>{
    const depth=getDepth(n,nodes);
    if(!levels[depth])levels[depth]=[];
    levels[depth].push({...n});
  });
  const maxDepth=Math.max(...Object.keys(levels).map(Number));
  Object.entries(levels).forEach(([d,ns])=>{
    const y=30+Number(d)*70;
    const step=580/(ns.length+1);
    ns.forEach((n,i)=>{n.dx=(i+1)*step;n.dy=y;result.push(n);});
  });
  return result;
}
function getDepth(node,nodes,d=0){
  if(!node.pid)return d;
  const p=nodes.find(n=>n.id===node.pid);
  return p?getDepth(p,nodes,d+1):d;
}
function forkProcess(){
  if(pcNodes.length>=12){document.getElementById('pctree-info').textContent='الشجرة وصلت للحد الأقصى (12 عملية)!';return;}
  const running=pcNodes.filter(n=>n.state==='running');
  if(!running.length){document.getElementById('pctree-info').textContent='لا توجد عملية تعمل! لا يمكن Fork.';return;}
  const parent=running[Math.floor(Math.random()*running.length)];
  const child={id:pcNextPid++,pid:parent.id,name:'child_'+pcNextPid,state:'running'};
  pcNodes.push(child);
  const _pi1=document.getElementById('pctree-info');if(_pi1)_pi1.textContent=`✅ Fork! العملية ${parent.id} أنشأت ابناً بـ PID ${child.id}`;
  drawPCTree();
}
function killParent(){
  const parents=pcNodes.filter(n=>pcNodes.some(c=>c.pid===n.id)&&n.state==='running');
  if(!parents.length){document.getElementById('pctree-info').textContent='لا يوجد أب له أبناء لإنهائه!';return;}
  const parent=parents[0];
  parent.state='dead';
  const orphans=pcNodes.filter(n=>n.pid===parent.id&&n.state==='running');
  orphans.forEach(o=>{o.state='orphan';o.pid=1;});
  const _pi2=document.getElementById('pctree-info');if(_pi2)_pi2.textContent=`💀 العملية ${parent.id} ماتت! أبناؤها (${orphans.map(o=>o.id).join(',')}) أصبحوا يتامى — تبنّاهم init(1)`;
  drawPCTree();
}
function resetTree(){
  pcNodes=[{id:1,pid:null,name:'init',state:'running'}];
  pcNextPid=1000;
  const _pi3=document.getElementById('pctree-info');if(_pi3)_pi3.textContent='تمت إعادة التشغيل. اضغط Fork لإنشاء عمليات جديدة.';
  drawPCTree();
}

// ── Pipe Animation ──
let pipeMode='ordinary',pipeAnim=null;
function initPipeCanvas(){
  const cv=document.getElementById('pipeCanvas');
  if(!cv)return;
  drawPipe(cv);
}
function drawPipe(cv){
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const w=cv.width,h=cv.height;
  const named=pipeMode==='named';
  const colA=named?'#a78bfa':'#fb923c';
  const colB=named?'#34d399':'#818cf8';
  const colPipe=named?'#818cf8':'#fb923c';
  const pipeY=85; // center of pipe row

  // ── Process A ──
  ctx.fillStyle='rgba(17,24,39,.95)';ctx.strokeStyle=colA;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.roundRect(12,pipeY-40,115,80,10);ctx.fill();ctx.stroke();
  ctx.fillStyle=colA;ctx.font='bold 11px system-ui';ctx.textAlign='center';
  ctx.fillText('⚙️ عملية A',70,pipeY-18);
  ctx.fillStyle='#94a3b8';ctx.font='8.5px system-ui';
  ctx.fillText(named?'أي عملية':'الأب (Parent)',70,pipeY);
  ctx.fillStyle=colA;ctx.font='bold 9px monospace';
  ctx.fillText('send( msg )',70,pipeY+20);

  // ── Pipe tube ──
  const px1=140,px2=430;
  // tube shadow
  ctx.fillStyle='rgba(20,30,20,.6)';ctx.strokeStyle=colPipe+'55';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(px1,pipeY-16,px2-px1,32,6);ctx.fill();ctx.stroke();
  // tube gradient overlay
  const grd=ctx.createLinearGradient(px1,0,px2,0);
  grd.addColorStop(0,colPipe+'33');grd.addColorStop(0.5,colPipe+'55');grd.addColorStop(1,colPipe+'33');
  ctx.fillStyle=grd;ctx.beginPath();ctx.roundRect(px1,pipeY-16,px2-px1,32,6);ctx.fill();
  // tube border
  ctx.strokeStyle=colPipe;ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(px1,pipeY-16,px2-px1,32,6);ctx.stroke();
  // tube label
  ctx.fillStyle=colPipe;ctx.font='bold 11px system-ui';ctx.textAlign='center';
  ctx.fillText(named?'📛 الأنبوب المسمّى (Named Pipe)':'🔧 الأنبوب العادي (Ordinary Pipe)',285,pipeY+4);
  // sub label
  ctx.fillStyle='#64748b';ctx.font='8px system-ui';
  ctx.fillText(named?'/tmp/mypipe':'أحادي الاتجاه',285,pipeY+17);

  // ── Process B ──
  ctx.fillStyle='rgba(17,24,39,.95)';ctx.strokeStyle=colB;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.roundRect(443,pipeY-40,115,80,10);ctx.fill();ctx.stroke();
  ctx.fillStyle=colB;ctx.font='bold 11px system-ui';ctx.textAlign='center';
  ctx.fillText('⚙️ عملية B',500,pipeY-18);
  ctx.fillStyle='#94a3b8';ctx.font='8.5px system-ui';
  ctx.fillText(named?'أي عملية':'الابن (Child)',500,pipeY);
  ctx.fillStyle=colB;ctx.font='bold 9px monospace';
  ctx.fillText('receive( msg )',500,pipeY+20);

  // ── Named pipe: bidirectional arrow ──
  if(named){
    ctx.strokeStyle='rgba(52,211,153,.5)';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(443,pipeY+36);ctx.lineTo(155,pipeY+36);ctx.stroke();
    ctx.setLineDash([]);
    // arrowheads
    ctx.fillStyle='rgba(52,211,153,.7)';
    ctx.beginPath();ctx.moveTo(155,pipeY+36);ctx.lineTo(163,pipeY+31);ctx.lineTo(163,pipeY+41);ctx.fill();
    ctx.fillStyle='#34d399';ctx.font='8px system-ui';ctx.textAlign='center';
    ctx.fillText('↔ ثنائي الاتجاه: B يمكنه الإرسال لـ A أيضاً',300,pipeY+50);
  }

  // ── Legend at bottom ──
  const ly=named?h-68:h-68;
  const legends=named?
    [['#a78bfa','عملية A: أي عملية (لا يشترط أب-ابن)'],
     ['#34d399','عملية B: أي عملية (مرونة كاملة)'],
     ['#818cf8','الأنبوب يبقى في النظام بعد انتهاء العمليات'],
     ['#38bdf8','ثنائي الاتجاه: كلا الطرفين يرسل ويستقبل']]:
    [['#fb923c','عملية A = الأب (Parent) ⭐'],
     ['#818cf8','عملية B = الابن (Child) ⭐'],
     ['#f87171','يتطلب علاقة Parent-Child ⭐'],
     ['#fbbf24','أحادي الاتجاه فقط (A → B)']];
  // 2x2 grid legend
  ctx.font='8.5px system-ui';ctx.textAlign='right';
  legends.forEach(([c,t],i)=>{
    const col2=i%2,row=Math.floor(i/2);
    const lx=col2===0?250:w-10;
    const lby=ly+row*18;
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(lx-ctx.measureText(t).width-10,lby,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#94a3b8';ctx.fillText(t,lx,lby+4);
  });
}
function sendPipeMsg(){
  const inp=document.getElementById('pipe-msg-in');
  const msg=(inp?inp.value.trim():'بيانات')+'';
  if(!msg)return;
  if(pipeAnim)return;
  const cv=document.getElementById('pipeCanvas');
  if(!cv)return;
  const _prb=document.getElementById('pipe-recv-box');if(_prb)_prb.style.display='none';
  pktArr=[{x:140,msg,t:Date.now(),done:false}];
  pipeAnim=setInterval(()=>animPipeMsg(cv,msg),16);
}
function animPipeMsg(cv,msg){
  const now=Date.now();
  drawPipe(cv);
  const ctx=cv.getContext('2d');
  const col=pipeMode==='named'?'#818cf8':'#fb923c';
  const elapsed=(now-pktArr[0].t)/1400;
  if(elapsed<1){
    const px=140+elapsed*(430-140);
    // packet bubble
    const tw=ctx.measureText(msg).width+14;
    ctx.fillStyle=col+'cc';ctx.beginPath();ctx.roundRect(px-tw/2,85-12,tw,22,6);ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold 8px system-ui';ctx.textAlign='center';
    ctx.fillText(msg.length>14?msg.slice(0,13)+'…':msg,px,85+3);
  } else {
    clearInterval(pipeAnim);pipeAnim=null;drawPipe(cv);
    // show received
    const box=document.getElementById('pipe-recv-box');
    const txt=document.getElementById('pipe-recv-text');
    if(box&&txt){box.style.display='block';txt.textContent='"'+msg+'"';}
  }
}
let pktArr=[];
// sendPipeData kept for backward compat but sendPipeMsg is primary
function sendPipeData(){sendPipeMsg();}
function setPipeMode(m){
  pipeMode=m;
  const _bo=document.getElementById('btn-ord');if(_bo)_bo.style.borderWidth=m==='ordinary'?'2px':'1px';
  const _bn=document.getElementById('btn-named');if(_bn)_bn.style.borderWidth=m==='named'?'2px':'1px';
  const info=document.getElementById('pipe-info');
  if(m==='ordinary')info.innerHTML='<b>الأنبوب العادي (Ordinary Pipe):</b> يتطلب علاقة أب-ابن ⭐ | أحادي الاتجاه | يختفي عند انتهاء العمليات';
  else info.innerHTML='<b style="color:#818cf8">الأنبوب المسمّى (Named Pipe):</b> لا يتطلب أب-ابن | ثنائي الاتجاه ⭐ | يبقى في نظام الملفات حتى بعد انتهاء العمليات';
  if(pipeAnim){clearInterval(pipeAnim);pipeAnim=null;}
  const cv=document.getElementById('pipeCanvas');
  if(cv)drawPipe(cv);
}
function resetPipe(){
  if(pipeAnim){clearInterval(pipeAnim);pipeAnim=null;}
  pktArr=[];
  const cv=document.getElementById('pipeCanvas');
  if(cv)drawPipe(cv);
}
